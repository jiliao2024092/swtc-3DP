# ════════════════════════════════════════════════════════════════
# 自動部署 Firebase Cloud Function
# 觸發：functions/ 或 firebase 相關檔案變動時，自動 deploy 到 Firebase
# 完成 IAM 設定後，本機 Node.js 永遠不用再開
# ════════════════════════════════════════════════════════════════

name: Deploy Firebase Cloud Function

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

# 同一時間只跑一個 deploy（避免並發衝突）
concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11 (matches Cloud Function runtime)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Write service account JSON to disk
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$SA_JSON" > "$HOME/sa-key.json"
          # 確認是有效 JSON（防呆）
          python3 -c "import json; json.load(open('$HOME/sa-key.json')); print('✓ Service account JSON valid')"

      - name: Pre-create venv (avoid runtime-detect issues)
        working-directory: ./functions
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --quiet -r requirements.txt
          deactivate

      - name: Deploy Cloud Functions + Firestore rules + indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/../sa-key.json
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/sa-key.json"
          firebase deploy \
            --only functions,firestore \
            --project swtc-3dp-poc \
            --non-interactive \
            --force

      - name: Cleanup
        if: always()
        run: rm -f "$HOME/sa-key.json"

      - name: Show recent function logs (post-deploy sanity)
        if: success()
        continue-on-error: true
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/sa-key.json"
          echo "## 最近 sync_formlabs_scheduled 執行紀錄"
          firebase functions:log --only sync_formlabs_scheduled -n 10 --project swtc-3dp-poc 2>&1 | head -50 || true
