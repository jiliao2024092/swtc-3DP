name: Sync Formlabs Printer Status

on:
  schedule:
    - cron: '*/5 * * * *'   # 每 5 分鐘執行一次
  workflow_dispatch:          # 允許手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # 需要寫入 repo 權限

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Formlabs access token
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST https://api.formlabs.com/developer/v1/o/token/ \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${{ secrets.FORMLABS_CLIENT_ID }}&client_secret=${{ secrets.FORMLABS_CLIENT_SECRET }}")

          TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")

          if [ -z "$TOKEN" ]; then
            echo "❌ 取得 access token 失敗"
            echo "$RESPONSE"
            exit 1
          fi

          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "✅ 成功取得 access token"

      - name: Fetch printer status
        run: |
          curl -s https://api.formlabs.com/developer/v1/printers/ \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -o raw-printers.json

          # 擷取需要的欄位，縮減檔案大小
          python3 << 'EOF'
          import json, datetime

          with open('raw-printers.json') as f:
              printers = json.load(f)

          result = []
          for p in printers:
              status = p.get('printer_status', {})
              run    = status.get('current_print_run') or {}

              # 計算列印進度百分比
              layer_now   = run.get('currently_printing_layer', 0) or 0
              layer_total = run.get('layer_count', 0) or 0
              progress    = round(layer_now / layer_total * 100, 1) if layer_total > 0 else 0

              # 剩餘時間轉換為可讀格式
              ms_left = run.get('estimated_time_remaining_ms', 0) or 0
              mins_left = ms_left // 60000
              time_left_str = f"{mins_left // 60}h {mins_left % 60}m" if mins_left >= 60 else (f"{mins_left}m" if mins_left > 0 else "-")

              result.append({
                  "serial":       p.get('serial', ''),
                  "alias":        p.get('alias') or p.get('machine_type_id', ''),
                  "machine_type": p.get('machine_type_id', ''),
                  "status":       status.get('status', 'UNKNOWN'),
                  "print_name":   run.get('name', ''),
                  "material":     run.get('material_name') or run.get('material', ''),
                  "progress":     progress,
                  "layer_now":    layer_now,
                  "layer_total":  layer_total,
                  "time_left":    time_left_str,
                  "last_pinged":  status.get('last_pinged_at', ''),
                  "updated_at":   datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
              })

          with open('printer-status.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f"✅ 已處理 {len(result)} 台列印機")
          for r in result:
              print(f"  {r['alias']} → {r['status']}  進度: {r['progress']}%")
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add printer-status.json
          # 只有檔案有變動才 commit（避免無意義的空 commit）
          git diff --cached --quiet || git commit -m "chore: sync printer status $(date -u +'%H:%M UTC')"
          git push
