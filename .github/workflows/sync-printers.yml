name: Sync Formlabs Printer Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'printer-status.json'
      - 'inventory.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Formlabs access token
        id: auth
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST https://api.formlabs.com/developer/v1/o/token/ \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${{ secrets.FORMLABS_CLIENT_ID }}&client_secret=${{ secrets.FORMLABS_CLIENT_SECRET }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Token failed: $BODY"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | python3 -c "import sys, json; print(json.load(sys.stdin).get('access_token', ''))")

          if [ -z "$TOKEN" ]; then
            echo "Empty token: $BODY"
            exit 1
          fi

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch printer status
        run: |
          HTTP_CODE=$(curl -s -w "%{http_code}" \
            -o raw-printers.json \
            https://api.formlabs.com/developer/v1/printers/ \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")

          echo "Printers API HTTP: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Printers API failed"
            cat raw-printers.json
            exit 1
          fi

      - name: Process printer data
        run: python3 process_printers.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add printer-status.json
          git add inventory.json 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: sync printer status $(date -u +'%H:%M UTC') [skip ci]"
          git push
