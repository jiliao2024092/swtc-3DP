name: Sync Formlabs Printer Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'printer-status.json'
      - 'bookings.json'
      - 'inventory.json'
      - '*.html'
      - '*.md'

# 同時只能跑一個，新觸發的會等舊的結束（避免 push 衝突）
concurrency:
  group: sync-printers
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install firebase-admin

      - name: Fetch Formlabs access token
        id: auth
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST https://api.formlabs.com/developer/v1/o/token/ \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${{ secrets.FORMLABS_CLIENT_ID }}&client_secret=${{ secrets.FORMLABS_CLIENT_SECRET }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Token failed: $BODY"
            exit 1
          fi

          TOKEN=$(echo "$BODY" | python3 -c "import sys, json; print(json.load(sys.stdin).get('access_token', ''))")

          if [ -z "$TOKEN" ]; then
            echo "Empty token: $BODY"
            exit 1
          fi

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch printer status
        run: |
          HTTP_CODE=$(curl -s -w "%{http_code}" \
            -o raw-printers.json \
            https://api.formlabs.com/developer/v1/printers/ \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")

          echo "Printers API HTTP: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Printers API failed"
            cat raw-printers.json
            exit 1
          fi

      - name: Fetch print history
        run: python3 fetch_prints.py "${{ steps.auth.outputs.token }}"

      - name: Process printer data + sync inventory to Firestore
        id: process
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python3 process_printers.py

      - name: Check process result
        run: |
          if [ "${{ steps.process.outcome }}" != "success" ]; then
            echo "⚠️ Part 2 (Firestore sync) 失敗，但 Part 1 (printer-status.json) 仍會 commit"
            echo "請至 Actions log 看 Part 2 的錯誤訊息"
          fi

      - name: Commit printer-status.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add printer-status.json
          if git diff --cached --quiet; then
            echo "No printer status changes"
            exit 0
          fi
          git commit -m "chore: sync printer status $(date -u +'%H:%M UTC') [skip ci]"

          # 推送（含衝突自動重試）：最多嘗試 3 次
          for i in 1 2 3; do
            echo "Push attempt $i/3..."
            if git push; then
              echo "✓ Push 成功"
              exit 0
            fi
            echo "Push 被拒，rebase 後重試..."
            # stash 防範本地有未追蹤檔案
            git pull --rebase --autostash origin main || {
              echo "Rebase 失敗，放棄"
              git rebase --abort 2>/dev/null || true
              exit 1
            }
            sleep 2
          done
          echo "✗ 重試 3 次仍失敗"
          exit 1
