name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    # ★ 移除 paths 過濾：任何 push 到 main 都觸發部署
    #   （之前的 paths 過濾會排除 portal/ 子資料夾的改動，導致不部署）
  workflow_dispatch:   # 也保留手動觸發選項

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
