name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      # ★ 用 '**' 前綴才能比對子資料夾（如 portal/issues.js）
      #   舊的 '*.js' 只比對根目錄，導致 portal/ 的改動不會觸發部署
      - '**.html'
      - '**.css'
      - '**.js'
      - '**.json'
      - '**.ico'
      - '**.png'
      - '**.svg'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
