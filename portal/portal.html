<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D 列印 · 工作看板 + 異常與資源</title>
<link rel="icon" type="image/x-icon" href="/swtc-3DP/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#fff;height:100vh;overflow:auto}
:root {
  --bg: #ffffff;
  --bg-soft: #fafbfc;
  --bg-panel: #f5f7f9;
  --line: #e6e8ec;
  --line-soft: #eef0f3;
  --ink: #0a0e14;
  --ink-2: #3b4250;
  --ink-3: #5a6270;
  --ink-4: #8a93a3;
  --accent: #0c7a99;
  --accent-soft: #e6f1f6;
  --ok: #1d6f43;
  --ok-soft: #e6f1ea;
  --warn: #c79b2a;
  --warn-soft: #fbf3dc;
  --danger: #c0392b;
  --danger-soft: #fbe7e3;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow-card: 0 1px 0 rgba(10,14,20,0.04), 0 1px 2px rgba(10,14,20,0.04);
  --shadow-card-hover: 0 2px 0 rgba(10,14,20,0.04), 0 4px 12px rgba(10,14,20,0.06);
  --font-ui: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
  --sidebar-w: 224px;
  --row-h: 56px;
  --day-w: 22px;
}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--font-ui);font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(10,14,20,0.035) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;mask-image:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.15));-webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.15))}

.shell{height:100vh;background:var(--bg);display:flex;position:relative;z-index:1;overflow:hidden}

/* Sidebar */
.shell-sidebar{width:var(--sidebar-w);flex:0 0 var(--sidebar-w);background:var(--bg-soft);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:18px 16px 16px;border-bottom:1px solid var(--line)}
.shell-brand-mark{width:28px;height:28px;background:#0a0e14;border-radius:7px;position:relative;flex-shrink:0}
.shell-brand-mark::before{content:'';position:absolute;top:6px;left:6px;width:6px;height:6px;background:var(--accent);border-radius:1px}
.shell-brand-mark::after{content:'';position:absolute;bottom:6px;right:6px;width:10px;height:2px;background:var(--accent);border-radius:1px}
.shell-brand-title{font-size:14px;font-weight:600;letter-spacing:-0.01em;line-height:1.1;color:var(--ink)}
.shell-brand-sub{font-size:9.5px;color:var(--ink-4);font-family:var(--font-mono);letter-spacing:0.1em;margin-top:3px}
.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:2px;padding:10px 8px;overflow-y:auto}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:0;background:transparent;border-radius:6px;cursor:pointer;text-align:left;font:inherit;color:var(--ink-3);transition:background 0.12s,color 0.12s;width:100%}
.sidebar-item:hover{background:var(--bg);color:var(--ink)}
.sidebar-item[aria-selected="true"]{background:var(--bg);color:var(--ink);box-shadow:0 0 0 1px var(--line)}
.sidebar-item[aria-selected="true"] .sidebar-item-icon{color:var(--accent)}
.sidebar-item-icon{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-4);flex-shrink:0}
.sidebar-item-text{display:flex;flex-direction:column;gap:2px;min-width:0}
.sidebar-item-label{font-size:13px;font-weight:600;letter-spacing:-0.005em;line-height:1.1}
.sidebar-item-sub{font-size:9.5px;font-family:var(--font-mono);color:var(--ink-4);letter-spacing:0.08em}
.sidebar-foot{padding:14px 16px;border-top:1px solid var(--line);font-family:var(--font-mono);font-size:10.5px;color:var(--ink-4);display:flex;flex-direction:column;gap:3px}
.sidebar-foot-date{color:var(--ink-2);font-feature-settings:'tnum'}
.sb-divider{height:1px;background:var(--line);margin:8px 12px}
.sb-admin-lbl{font-size:9.5px;color:var(--ink-4);font-family:var(--font-mono);letter-spacing:.1em;text-transform:uppercase;padding:4px 12px 2px}

/* Main */
.shell-main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.shell-top{display:flex;align-items:center;gap:18px;padding:0 28px;border-bottom:1px solid var(--line);background:rgba(255,255,255,0.94);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20;min-height:48px}
.shell-tabs{display:flex;gap:4px;align-items:center}
.shell-tab{position:relative;border:1px solid transparent;background:transparent;font:inherit;font-size:13px;font-weight:500;color:var(--ink-3);padding:6px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.12s,color 0.12s}
.shell-tab:hover{color:var(--ink);background:var(--bg-soft)}
.shell-tab[aria-selected="true"]{color:var(--ink);font-weight:600;background:var(--bg-soft);border-color:var(--line)}
.shell-tab-icon{width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;color:currentColor;flex-shrink:0}
.shell-spacer{flex:1}
.shell-aux{font-size:10.5px;color:var(--ink-4);font-family:var(--font-mono);letter-spacing:0.08em}
.shell-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow:auto;background:var(--bg)}

/* Table */
.table-view{display:flex;flex-direction:column;flex:1;min-height:0;background:var(--bg);overflow:hidden}
.toolbar{display:flex;align-items:center;gap:8px;padding:10px 28px;border-bottom:1px solid var(--line);background:var(--bg);flex-wrap:nowrap;flex-shrink:0;overflow-x:auto}
.toolbar::-webkit-scrollbar{height:3px}
.toolbar::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
.toolbar-title{font-size:13px;font-weight:600;letter-spacing:-0.01em;color:var(--ink);white-space:nowrap;flex-shrink:0}
.toolbar-sub{font-size:11.5px;color:var(--ink-4);font-family:var(--font-mono);white-space:nowrap;flex-shrink:0}
.toolbar-divider{width:1px;height:18px;background:var(--line);margin:0 4px;flex-shrink:0}
.t-sel-pill{height:30px;padding:0 26px 0 10px;border:1px solid var(--line);border-radius:999px;background:var(--bg-soft);color:var(--ink-2);font:inherit;font-size:12px;cursor:pointer;-webkit-appearance:none;appearance:none;white-space:nowrap;flex-shrink:0;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' fill='none' stroke='%235a6270' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
.t-sel-pill:hover{border-color:#cdd1d8;color:var(--ink)}
.t-sel-pill:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.t-pill-btn{height:30px;padding:0 13px;border:1px solid var(--line);border-radius:999px;background:var(--bg-soft);color:var(--ink-3);font:inherit;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;transition:all 0.12s}
.t-pill-btn:hover{border-color:#cdd1d8;color:var(--ink)}
.t-pill-btn.active{background:var(--bg);border-color:var(--ink-2);color:var(--ink);font-weight:600;box-shadow:0 0 0 1px var(--ink-2)}
.table-wrap{flex:1;overflow:auto;padding:0 28px 24px}
.kt{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;background:var(--bg);border:1px solid var(--line);border-radius:8px;overflow:hidden}
.kt thead{background:#fafbfc}
.kt th{text-align:left;font-weight:600;font-size:10.5px;font-family:var(--font-mono);color:var(--ink-3);letter-spacing:0.06em;text-transform:uppercase;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;background:#fafbfc;z-index:1;user-select:none}
.kt th.sortable{cursor:pointer}
.kt th.sortable:hover{color:var(--ink)}
.kt th .sort-indicator{display:inline-block;margin-left:4px;color:var(--ink-4);font-size:9px}
.kt th.sorted{color:var(--accent)}
.kt th.sorted .sort-indicator{color:var(--accent)}
.kt td{padding:10px 12px;border-bottom:1px solid var(--line-soft);color:var(--ink-2);vertical-align:middle}
.kt tbody tr:hover{background:var(--bg-soft)}
.kt tbody tr:last-child td{border-bottom:0}
.kt .col-seq{text-align:right;font-family:var(--font-mono);color:var(--ink-4);width:56px;font-feature-settings:'tnum'}
.kt .col-id{font-family:var(--font-mono);color:var(--accent);font-weight:500;font-size:11.5px}
.kt .col-date{font-family:var(--font-mono);font-feature-settings:'tnum';color:var(--ink-3);font-size:11.5px;white-space:nowrap}
.kt .col-prog{width:130px}
.kt .col-machine{font-family:var(--font-mono);color:var(--ink-2);font-size:11.5px}
.kt .col-actions{width:90px;text-align:right}
.kt .col-customer{font-weight:500;color:var(--ink)}
.kt-pill{display:inline-flex;align-items:center;height:18px;padding:0 8px;font-size:10.5px;border-radius:999px;font-family:var(--font-mono);font-weight:600;white-space:nowrap}
.kt-pill-todo{background:#eef0f3;color:#5a6270}
.kt-pill-blocked{background:#fbf3dc;color:#8b6b13}
.kt-pill-progress{background:#e6f1f6;color:#0c7a99}
.kt-pill-done{background:#e6f1ea;color:#1d6f43}
.kt-pill-cancelled{background:#f0f1f4;color:#8a93a3}
.kt-mat-ok{color:#1d6f43;font-weight:500}
.kt-mat-need{color:#8b6b13;font-weight:500}
.kt-eng{display:inline-flex;align-items:center;gap:6px}
.kt-eng-dot{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:var(--font-mono)}
.kt-prog{display:flex;align-items:center;gap:8px}
.kt-prog-bar{flex:1;height:4px;background:var(--line);border-radius:2px;overflow:hidden;min-width:60px}
.kt-prog-fill{height:100%;background:var(--accent)}
.kt-prog-num{font-family:var(--font-mono);font-size:11px;color:var(--ink-2);font-feature-settings:'tnum';min-width:32px;text-align:right}
.kt-due{display:inline-block;font-family:var(--font-mono);font-size:11.5px;font-feature-settings:'tnum';white-space:nowrap}
.kt-due-red{color:#c0392b;font-weight:600}
.kt-due-amber{color:#c79b2a;font-weight:600}
.kt-act{display:inline-flex;gap:4px}
.kt-actbtn{width:24px;height:24px;border:1px solid var(--line);background:var(--bg);border-radius:5px;cursor:pointer;color:var(--ink-3);display:inline-flex;align-items:center;justify-content:center;transition:all 0.12s;font-size:11px}
.kt-actbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.kt-actbtn.danger:hover{border-color:#c0392b;color:#c0392b;background:#fbe7e3}
.kt-empty{padding:60px 0;text-align:center;color:var(--ink-4);font-family:var(--font-mono);font-size:12px}
.kt-pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 28px;border-top:1px solid var(--line);background:var(--bg);font-size:12px;color:var(--ink-3);font-family:var(--font-mono);flex-wrap:wrap;gap:12px}
.kt-pagination-info{display:flex;align-items:center;gap:8px}
.kt-pagination-pages{display:flex;gap:3px;align-items:center}
.kt-page{min-width:28px;height:28px;padding:0 8px;border:1px solid var(--line);background:var(--bg);border-radius:5px;font:inherit;font-size:11.5px;cursor:pointer;color:var(--ink-3);font-family:var(--font-mono);font-feature-settings:'tnum'}
.kt-page:hover{border-color:var(--accent);color:var(--accent)}
.kt-page[aria-current="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
.kt-page:disabled{opacity:0.4;cursor:not-allowed}
.kt-num-badge{display:inline-flex;align-items:center;padding:1px 8px;border-radius:4px;background:var(--accent-soft);color:var(--accent);font-family:var(--font-mono);font-size:11px;font-weight:600;font-feature-settings:'tnum'}
.kt-money{font-family:var(--font-mono);font-feature-settings:'tnum';color:var(--ink);font-weight:600;text-align:right;white-space:nowrap}
.kt-anomaly-sub{background:var(--bg-soft)}
.kt-anomaly-sub td{font-size:11.5px;color:var(--ink-3);padding-top:6px;padding-bottom:6px}
.kt-anomaly-sub td:first-child{padding-left:42px;position:relative}
.kt-anomaly-sub-marker{display:inline-flex;align-items:center;gap:6px;color:var(--ink-4);font-family:var(--font-mono);font-size:10.5px}
.kt-anomaly-sub-marker::before{content:'';display:inline-block;width:10px;height:1px;background:var(--line)}
/* ── 點擊展開：主列游標、展開三角、後續數量徽章 ── */
.case-clickable{cursor:pointer}
.case-clickable:hover{background:var(--bg-soft)}
.case-caret{display:inline-block;width:12px;color:var(--ink-4);font-size:9px;margin-right:3px;transition:color .15s}
.case-clickable:hover .case-caret{color:var(--ink-2)}
.case-more{display:inline-block;margin-left:6px;font-size:10px;font-family:var(--font-mono);color:#fff;background:var(--ink-4);border-radius:999px;padding:0 6px;line-height:16px;vertical-align:middle}
.kt-pill-完成{background:#e6f1ea;color:#1d6f43}
.kt-pill-處理{background:#fbf3dc;color:#8b6b13}
.kt-pill-暫停{background:#fbe7e3;color:#8a1d12}

/* Search/Filter */
.t-search{display:flex;align-items:center;gap:8px;height:32px;padding:0 12px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--ink-4);min-width:220px}
.t-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);color:var(--ink-2)}
.t-search input{border:0;outline:0;background:transparent;font:inherit;width:100%;color:var(--ink)}
.t-search input::placeholder{color:var(--ink-4)}
.t-sel{height:32px;padding:0 28px 0 10px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--ink-2);font:inherit;font-size:13px;cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' fill='none' stroke='%235a6270' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
.t-sel:hover{border-color:#cdd1d8}
.t-sel:focus{outline:0;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.t-btn{height:32px;padding:0 14px;border:1px solid var(--line);background:var(--bg);color:var(--ink-2);font:inherit;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.t-btn:hover{border-color:#cdd1d8;color:var(--ink)}
.t-btn-primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.t-btn-primary:hover{background:#25303f;color:#fff}

/* Kanban */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-bottom:1px solid var(--line);background:var(--bg)}
.kpi-cell{padding:16px 24px 18px;border-right:1px solid var(--line-soft);position:relative}
.kpi-cell:last-child{border-right:0}
.kpi-label{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-4);font-weight:600;font-family:var(--font-mono)}
.kpi-value{font-size:30px;font-weight:600;font-family:var(--font-mono);letter-spacing:-0.02em;color:var(--ink);margin-top:4px;line-height:1.1;font-feature-settings:'tnum'}
.kpi-sub{font-size:11px;color:var(--ink-4);margin-top:4px}
.board{flex:1;display:flex;gap:10px;padding:16px 16px 20px;overflow-x:auto;align-items:flex-start;background:linear-gradient(180deg,var(--bg) 0%,var(--bg-soft) 80px);min-height:0}
.col{flex:1 1 0;min-width:180px;background:var(--bg-panel);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;max-height:calc(100vh - 220px);transition:border-color 0.15s,background 0.15s}
.col-over{border-color:var(--accent);background:var(--accent-soft)}
.col-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--line-soft)}
.col-head-left{display:flex;align-items:center;gap:8px}
.col-dot{width:6px;height:6px;border-radius:50%}
.col-title{font-weight:600;font-size:13.5px;color:var(--ink)}
.col-count{font-size:11px;font-family:var(--font-mono);font-feature-settings:'tnum';color:var(--ink-3);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:0 7px;min-width:22px;height:18px;display:inline-flex;align-items:center;justify-content:center}
.col-hint{font-size:10.5px;color:var(--ink-4);font-family:var(--font-mono);letter-spacing:0.02em}
.col-body{padding:10px 10px 12px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;min-height:80px}
.col-empty{text-align:center;color:var(--ink-4);font-size:12px;padding:24px 0;font-family:var(--font-mono)}
.card{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:9px 10px 9px;cursor:grab;box-shadow:var(--shadow-card);transition:box-shadow 0.15s,border-color 0.15s,transform 0.15s;display:flex;flex-direction:column;gap:6px}
.card:hover{border-color:#d2d6dd;box-shadow:var(--shadow-card-hover)}
.card:active{cursor:grabbing}
.card-dragging{opacity:0.4}
.card-cancelled{opacity:0.62}
.card-cancelled .card-title{text-decoration:line-through;text-decoration-color:var(--ink-4)}
.card-compact{padding:9px 11px;gap:6px}
.card-top{display:flex;align-items:center;justify-content:space-between}
.card-top-right{display:flex;align-items:center;gap:6px}
.card-id{font-size:11px;font-family:var(--font-mono);color:var(--ink-4);letter-spacing:0.02em}
.card-title{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.3;letter-spacing:-0.005em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-compact .card-title{font-size:12.5px;-webkit-line-clamp:1}
.card-meta{font-size:11.5px;color:var(--ink-3);display:flex;gap:4px;align-items:baseline;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.meta-machine{font-family:var(--font-mono);color:var(--ink-2)}
.meta-remark{color:var(--ink-4);text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.card-progress{display:flex;align-items:center;gap:8px}
.progress-track{flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);transition:width 0.25s}
.progress-num{font-size:10.5px;color:var(--ink-3);font-family:var(--font-mono);font-feature-settings:'tnum';min-width:30px;text-align:right}
.card-foot{display:flex;align-items:center;justify-content:space-between}
.seq-num{font-size:10.5px;font-family:var(--font-mono);color:var(--ink-4);font-feature-settings:'tnum'}
.avatar{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--font-mono);letter-spacing:0.02em;border:1px solid transparent;flex-shrink:0}
.chip{display:inline-flex;align-items:center;height:18px;padding:0 7px;font-size:10.5px;font-family:var(--font-mono);border-radius:4px;letter-spacing:0.01em;white-space:nowrap}
.chip-muted{color:var(--ink-3);background:var(--bg-panel);border:1px solid var(--line)}
.chip-amber{color:#8b6b13;background:var(--warn-soft);border:1px solid #f0e4b8}
.chip-red{color:#8a1d12;background:var(--danger-soft);border:1px solid #f3c8c0}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-amber{background:var(--warn)}

/* Drawer */
.drawer-wrap{position:fixed;inset:0;background:rgba(10,14,20,0.18);z-index:50;display:flex;justify-content:flex-end;animation:fade 0.12s ease}
.drawer{width:min(440px,92vw);height:100%;background:var(--bg);border-left:1px solid var(--line);box-shadow:-16px 0 30px rgba(10,14,20,0.08);padding:22px 24px 24px;overflow-y:auto;animation:slidein 0.18s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.drawer-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.drawer-eyebrow{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-4);font-weight:600;font-family:var(--font-mono)}
.drawer-id{font-size:18px;font-weight:600;font-family:var(--font-mono);margin-top:4px;letter-spacing:-0.01em}
.icon-btn{width:28px;height:28px;border:1px solid var(--line);background:var(--bg);border-radius:6px;cursor:pointer;font-size:16px;line-height:1;color:var(--ink-3)}
.icon-btn:hover{background:var(--bg-panel);color:var(--ink)}
.drawer-customer{font-size:18px;font-weight:600;letter-spacing:-0.01em;padding:14px 0 18px;border-bottom:1px solid var(--line-soft);margin-bottom:18px}
.drawer-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:16px}
.field-label{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-4);font-family:var(--font-mono);margin-bottom:6px}
.field-value{font-size:13.5px;color:var(--ink);display:flex;align-items:center}
.field-value.mono{font-family:var(--font-mono)}
.pill{display:inline-flex;align-items:center;font-size:11.5px;padding:2px 9px;border-radius:999px;font-weight:600;font-family:var(--font-mono)}
.pill-ok{background:var(--ok-soft);color:var(--ok)}
.pill-amber{background:var(--warn-soft);color:#8b6b13}
.remark-box{display:block;padding:10px 12px;background:var(--bg-panel);border:1px solid var(--line);border-radius:6px;font-size:13px;color:var(--ink-2);min-height:44px}
.drawer-foot{display:flex;justify-content:space-between;margin-top:24px;padding-top:16px;border-top:1px solid var(--line-soft);font-size:11px;color:var(--ink-4);font-family:var(--font-mono)}

/* Gantt */
.gantt{flex:1;display:flex;overflow:auto;background:var(--bg)}
.gantt-left{flex:0 0 200px;width:200px;position:sticky;left:0;background:var(--bg);z-index:5;border-right:1px solid var(--line)}
.gantt-right{flex:1;position:relative;min-width:0}
.scale{position:sticky;top:0;background:var(--bg);z-index:4;border-bottom:1px solid var(--line);height:48px;display:flex}
.scale-months{position:absolute;top:0;left:0;right:0;height:22px;display:flex;border-bottom:1px solid var(--line-soft)}
.scale-month{border-right:1px solid var(--line-soft);font-size:11px;font-family:var(--font-mono);color:var(--ink-2);font-weight:600;letter-spacing:0.02em;padding:4px 8px;white-space:nowrap;overflow:hidden}
.scale-days{position:absolute;top:22px;left:0;right:0;height:26px;display:flex}
.scale-day{width:var(--day-w);border-right:1px solid var(--line-soft);font-size:9.5px;font-family:var(--font-mono);color:var(--ink-4);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-feature-settings:'tnum'}
.scale-day.weekend{background:var(--bg-soft)}
.scale-day.is-today{background:#fff3ec;color:var(--danger);font-weight:700}
.lane-head-sticky{position:sticky;top:0;background:var(--bg);z-index:6;height:48px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 14px;font-size:11px;font-family:var(--font-mono);color:var(--ink-3);letter-spacing:0.06em;text-transform:uppercase;font-weight:600}
.lane{height:var(--row-h);border-bottom:1px solid var(--line-soft);display:flex;align-items:center;padding:0 14px;gap:10px}
.lane:last-child{border-bottom:0}
.lane-avatar{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--font-mono);flex-shrink:0}
.lane-meta{display:flex;flex-direction:column;gap:1px;min-width:0}
.lane-name{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-0.005em}
.lane-sub{font-size:10.5px;color:var(--ink-4);font-family:var(--font-mono);font-feature-settings:'tnum'}
.row{height:var(--row-h);border-bottom:1px solid var(--line-soft);position:relative}
.row:last-child{border-bottom:0}
.row.alt{background:var(--bg-soft)}
.today-line{position:absolute;top:0;bottom:0;width:1.5px;background:var(--danger);opacity:0.7;z-index:3;pointer-events:none}
.today-line::before{content:'';position:absolute;top:-3px;left:-3px;width:7.5px;height:7px;background:var(--danger);border-radius:50%}
.bar{position:absolute;top:50%;transform:translateY(-50%);height:26px;border-radius:999px;display:flex;align-items:center;padding:0 8px;cursor:pointer;overflow:hidden;transition:box-shadow 0.15s;font-size:10.5px;font-family:var(--font-mono);font-weight:500;color:var(--ink);z-index:2}
.bar:hover{box-shadow:0 2px 8px rgba(10,14,20,0.12);z-index:4}
.bar.progress{background:var(--accent-soft);border:1px solid #b8d3df;color:#054a60}
.bar.done{background:var(--ok);border:1px solid var(--ok);color:#fff}
.bar.blocked{background:var(--warn-soft);border:1px solid #f0e4b8;color:#6b4f0e}
.bar.todo{background:var(--bg);border:1px dashed #cbd0d8;color:var(--ink-3)}
.bar.cancelled{background:repeating-linear-gradient(45deg,var(--bg-soft) 0 4px,#f0f1f4 4px 8px);border:1px solid var(--line);color:var(--ink-4)}
.bar-fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);opacity:0.85;z-index:0}
.bar.done .bar-fill{background:rgba(255,255,255,0.18)}
.bar.progress .bar-fill{background:var(--accent);opacity:0.78}
.bar-text{position:relative;z-index:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar.progress .bar-text{color:#fff}
.bar-due-marker{position:absolute;top:-2px;right:-2px;width:4px;height:calc(100% + 4px);background:var(--warn);border-radius:0 999px 999px 0}

/* Dashboard */
.dash{flex:1;overflow:auto;padding:0 28px 32px;background:var(--bg)}
.dash-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:18px 0}
.dash-kpi{border:1px solid var(--line);border-radius:8px;padding:14px 16px;background:var(--bg)}
.dash-kpi-label{font-size:10.5px;font-family:var(--font-mono);color:var(--ink-4);font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
.dash-kpi-value{font-size:30px;font-weight:600;font-family:var(--font-mono);letter-spacing:-0.02em;color:var(--ink);margin-top:4px;line-height:1.1;font-feature-settings:'tnum'}
.dash-kpi-sub{font-size:10.5px;color:var(--ink-4);margin-top:4px;font-family:var(--font-mono)}
.dash-section{display:flex;align-items:baseline;gap:10px;padding:16px 0 12px}
.dash-section-title{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-0.01em}
.dash-section-sub{font-size:11px;color:var(--ink-4);font-family:var(--font-mono)}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.chart-card{border:1px solid var(--line);border-radius:8px;background:var(--bg);padding:14px 16px 16px;display:flex;flex-direction:column;min-height:280px}
.chart-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.chart-card-title{font-size:12.5px;font-weight:600;color:var(--ink);letter-spacing:-0.005em}
.chart-card-meta{font-size:10.5px;color:var(--ink-4);font-family:var(--font-mono)}
.chart-body{flex:1;display:flex;align-items:center;justify-content:center;min-height:200px;position:relative}
.hbar-list{display:flex;flex-direction:column;gap:6px;width:100%;padding:4px 0}
.hbar-row{display:grid;grid-template-columns:96px 1fr 36px;gap:10px;align-items:center}
.hbar-label{font-size:11px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-track{position:relative;height:14px;background:var(--bg-soft);border-radius:4px;overflow:hidden}
.hbar-fill{position:absolute;inset:0 auto 0 0;background:var(--accent);border-radius:4px;transition:width 0.3s}
.hbar-num{font-size:11px;font-family:var(--font-mono);color:var(--ink-2);text-align:right;font-feature-settings:'tnum'}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-center-value{font-size:24px;font-weight:600;font-family:var(--font-mono);color:var(--ink);letter-spacing:-0.02em;line-height:1;font-feature-settings:'tnum'}
.donut-center-label{font-size:10px;color:var(--ink-4);font-family:var(--font-mono);margin-top:4px;letter-spacing:0.06em;text-transform:uppercase}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px 12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line-soft);font-size:10.5px;color:var(--ink-3);font-family:var(--font-mono)}
.chart-legend-item{display:inline-flex;align-items:center;gap:5px}
.chart-legend-dot{width:8px;height:8px;border-radius:2px}
.chart-empty{color:var(--ink-4);font-family:var(--font-mono);font-size:11px;padding:40px 0;text-align:center}

/* Issues subtabs */
.issues-subtabs{display:inline-flex;border:1px solid var(--line);border-radius:6px;padding:2px;gap:2px;background:var(--bg)}
.issues-subtab{border:0;background:transparent;font:inherit;font-size:12.5px;padding:0 12px;height:26px;border-radius:4px;cursor:pointer;color:var(--ink-3);font-weight:500;display:inline-flex;align-items:center;gap:6px}
.issues-subtab:hover{color:var(--ink)}
.issues-subtab[aria-selected="true"]{background:var(--ink);color:#fff}
.issues-subtab-count{font-family:var(--font-mono);font-size:10px;padding:0 5px;height:14px;display:inline-flex;align-items:center;border-radius:999px;background:rgba(0,0,0,0.06);font-feature-settings:'tnum'}
.issues-subtab[aria-selected="true"] .issues-subtab-count{background:rgba(255,255,255,0.18)}
.iss-analytic{flex:1;overflow:auto;padding:20px 28px 32px;background:var(--bg)}
.iss-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* Modal */
.m-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:5000}
.m-box{background:#fff;border-radius:12px;width:640px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 16px 40px rgba(0,0,0,.2)}
.m-hd{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.m-hd h3{font-size:15px;font-weight:700}
.m-close{background:none;border:none;font-size:22px;cursor:pointer;color:#8a93a3;padding:2px 6px;border-radius:4px}
.m-close:hover{background:#eef0f3}
.m-body{padding:0 24px}
.m-foot{padding:16px 24px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #e6e8ec;margin-top:16px}
.m-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
.m-field{margin-bottom:14px}
.btn-cancel{height:34px;padding:0 16px;border:1px solid #e6e8ec;background:#fff;color:#3b4250;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-save{height:34px;padding:0 16px;border:none;background:#0a0e14;color:#fff;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;font-family:inherit}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-add{height:32px;padding:0 14px;border:none;background:#0a0e14;color:#fff;font-size:13px;font-weight:600;border-radius:6px;cursor:pointer;font-family:inherit}

/* Login */
.login-page{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0a0e14,#131c2e,#0c2340);display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:16px;padding:40px 48px;width:420px;max-width:95vw;box-shadow:0 24px 48px rgba(0,0,0,.3)}
.login-brand{text-align:center;margin-bottom:28px}
.login-brand-mark{width:48px;height:48px;background:#0a0e14;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;position:relative}
.login-brand-mark::before{content:'';position:absolute;top:11px;left:11px;width:10px;height:10px;background:#0c7a99;border-radius:2px}
.login-brand-mark::after{content:'';position:absolute;bottom:11px;right:11px;width:16px;height:3px;background:#0c7a99;border-radius:1px}
.login-brand h1{font-size:18px;font-weight:700;color:#0a0e14}
.login-brand p{font-size:11px;color:#8a93a3;font-family:'JetBrains Mono',monospace;letter-spacing:.08em;margin-top:4px}
.login-err{background:#fff5f5;border:1px solid #ffc9c9;color:#c0392b;border-radius:6px;padding:9px 12px;font-size:12.5px;margin-bottom:14px;display:none}
.login-err.show{display:block}
.login-fg{margin-bottom:16px}
.login-fg label{display:block;font-size:12px;font-weight:600;color:#5a6270;margin-bottom:5px}
.login-fg input{width:100%;padding:9px 13px;border:1.5px solid #e6e8ec;border-radius:7px;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s}
.login-fg input:focus{border-color:#0c7a99;box-shadow:0 0 0 3px #e6f1f6}
.login-submit{width:100%;padding:11px;border:0;border-radius:7px;background:#0a0e14;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.login-submit:hover{background:#1a2334}
.login-submit:disabled{opacity:.5;cursor:not-allowed}

/* Admin */
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.perm-chip{display:flex;align-items:center;gap:7px;padding:7px 10px;border:1.5px solid #e6e8ec;border-radius:6px;cursor:pointer;font-size:12px;transition:all .12s;user-select:none}
.perm-chip:hover,.perm-chip.on{border-color:#0c7a99;background:#e6f1f6}
.perm-chip input{accent-color:#0c7a99;width:14px;height:14px;cursor:pointer;flex-shrink:0}
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.preset-chip{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #e6e8ec;background:#fff;color:#5a6270;font-family:inherit;transition:all .12s}
.preset-chip.p-admin{border-color:#e6b800;color:#7a5000;background:#fffadc}
.preset-chip.p-mgr{border-color:#0c7a99;color:#0c7a99;background:#e6f1f6}
.preset-chip.p-eng{border-color:#1d6f43;color:#1d6f43;background:#e6f1ea}
.preset-chip.p-view{border-color:#8a93a3;color:#5a6270;background:#f5f6f8}
.u-tbl{width:100%;border-collapse:collapse}
.u-tbl th{padding:9px 14px;text-align:left;font-size:11px;font-weight:700;color:#8a93a3;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #e6e8ec;background:#fafbfc;white-space:nowrap}
.u-tbl td{padding:11px 14px;border-bottom:1px solid #eef0f3;font-size:13px;vertical-align:middle}
.u-tbl tr:hover td{background:#fafbfc}
.u-avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:#0a0e14;color:#fff;flex-shrink:0}
.role-chip{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700}
.role-chip.admin{background:#fffadc;color:#7a5000}
.role-chip.manager{background:#e6f1f6;color:#0c7a99}
.role-chip.operator{background:#e6f1ea;color:#1d6f43}
.role-chip.viewer{background:#f5f6f8;color:#5a6270}
.st-dot{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600}
.st-dot.on{color:#1d6f43}.st-dot.off{color:#8a93a3}
.seg{display:flex;gap:2px}
.seg-btn{border:1px solid #e6e8ec;background:#fff;color:#5a6270;font-size:12px;font-weight:500;padding:5px 12px;border-radius:5px;cursor:pointer;font-family:inherit;transition:all .12s}
.seg-btn.active{background:#0a0e14;color:#fff;border-color:#0a0e14}
.adm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.adm-stat{background:#fafbfc;border:1px solid #e6e8ec;border-radius:8px;padding:18px 20px}
.adm-stat-val{font-size:28px;font-weight:800;color:#0a0e14}
.adm-stat-lbl{font-size:12px;color:#8a93a3;margin-top:2px}

/* Toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9000;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:11px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:tIn .2s ease;display:flex;align-items:center;gap:8px}
.toast-item.ok{background:#1d6f43}.toast-item.err{background:#c0392b}.toast-item.inf{background:#0c7a99}
@keyframes tIn{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Scrollbar */
.col-body::-webkit-scrollbar,.board::-webkit-scrollbar,.gantt::-webkit-scrollbar{height:10px;width:10px}
.col-body::-webkit-scrollbar-thumb,.board::-webkit-scrollbar-thumb,.gantt::-webkit-scrollbar-thumb{background:#d6dae1;border-radius:999px;border:2px solid var(--bg-panel)}
.board::-webkit-scrollbar-thumb{border-color:var(--bg)}

/* Responsive */
@media(max-width:960px){:root{--sidebar-w:60px}.sidebar-brand>div:not(.shell-brand-mark){display:none}.sidebar-item-text{display:none}.sidebar-item{justify-content:center;padding:10px 8px}.sidebar-foot{display:none}}
@media(max-width:1100px){.dash-kpis{grid-template-columns:repeat(3,1fr)}.dash-grid{grid-template-columns:repeat(2,1fr)}.iss-grid{grid-template-columns:repeat(2,1fr)}.kpi-strip{grid-template-columns:repeat(3,1fr)}}
@media(max-width:720px){.dash-kpis{grid-template-columns:repeat(2,1fr)}.dash-grid{grid-template-columns:1fr}.iss-grid{grid-template-columns:1fr}}
@media(max-width:600px){.shell-top{padding:0 14px;gap:6px;flex-wrap:wrap}.shell-tab{padding:11px 10px;font-size:12px}.shell-aux{display:none}}
</style>
</head>
<body>
<div id="root"></div>
<div id="toasts" class="toast-wrap"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<!-- React -->
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>

<!-- Firebase 設定 -->
<script src="firebase-config.js?v=20260629g"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<!-- Firebase 服務層 -->
<script src="firebase-service.js?v=20260629g"></script>
<!-- ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<!-- 共用常數 / Helpers -->
<script>
// 全域 showToast（保險：直接定義在 portal.html，不依賴 firebase-service.js 載入順序）
window.showToast = window.showToast || function (msg, type) {
  const wrap = document.getElementById('toasts');
  if (!wrap) { console.log('[toast]', msg); return; }
  const el = document.createElement('div');
  el.className = 'toast-item ' + (type === 'err' ? 'err' : type === 'inf' ? 'inf' : 'ok');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity .3s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 300);
  }, 2800);
};
</script>

  K.ENG_TONE = {

  K.MACHINES = ['Form4', 'Form4L', 'Fuse1+', 'Mark2'];

  K.PROGRESS_VALUES = [0, 25, 50, 75, 100];
  K.STATUS_TONE = {
    todo:      { fg:'#5a6270', bg:'#eef0f3', label:'待開始' },
    blocked:   { fg:'#8b6b13', bg:'#fbf3dc', label:'等待材料' },
    progress:  { fg:'#0c7a99', bg:'#e6f1f6', label:'進行中' },
    done:      { fg:'#1d6f43', bg:'#e6f1ea', label:'已完成' },
    cancelled: { fg:'#8a93a3', bg:'#f0f1f4', label:'已取消' },
  };
  K.daysUntil = function(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr);
    if (Number.isNaN(d.getTime())) return null;
    return Math.round((d - K.TODAY) / K.DAY);
  };
  K.statusOf = function(item) {
    if (/取消/.test(item.remark)) return 'cancelled';
    if (item.complete === '是' || item.progress === 100) return 'done';
    if (item.material === '需調撥') return 'blocked';
    if (item.progress > 0) return 'progress';
    return 'todo';
  };
  K.fmtYmd = function(d) {
    if (!d) return '—';
    const x = (d instanceof Date) ? d : new Date(d);
    if (Number.isNaN(x.getTime())) return '—';
    return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  };
  K.applyFilters = function(data, { search='', engineer='', machine='', status='' } = {}) {
    const s = (search||'').trim().toLowerCase();
    return data.filter(d => {
      if (s && !d.id.toLowerCase().includes(s) && !d.customer.toLowerCase().includes(s)) return false;
      if (engineer && d.engineer !== engineer) return false;
      if (machine  && d.machine  !== machine)  return false;
      if (status   && K.statusOf(d) !== status) return false;
      return true;
    });
  };
  window.K = K;

  window.applySettings = function(settings) {
    if (!settings) return;
    const eng = settings.engineers;
    const mch = settings.machines;
    if (eng && Array.isArray(eng)) {
      window._settings_engineers = eng.map(e => e.key);
      eng.forEach(e => {
        K.ENG_LABEL[e.key]     = e.label;
        K.ENG_FULLLABEL[e.key] = e.label + ' (' + e.key + ')';
        if (!K.ENG_TONE[e.key]) K.ENG_TONE[e.key] = { fg:'#5a6270', bg:'#eef0f3' };
        if (!K.ENG_INIT[e.key]) K.ENG_INIT[e.key] = e.key.slice(0,2).toUpperCase();
      });
    }
    if (mch && Array.isArray(mch)) {
      window._settings_machines = mch.map(m => m.name);
    }
    if (window._onSettingsUpdated) window._onSettingsUpdated();
  };
})();
</script>

<script type="text/babel" data-presets="react">
const { useState: useStateT, useMemo: useMemoT } = React;

function TableView({ data, setData }) {
  const K = window.K;
  const [search, setSearch] = useStateT('');
  const [engF, setEngF] = useStateT('');
  const [machF, setMachF] = useStateT('');
  const [statusF, setStatusF] = useStateT('');
  const [matF, setMatF] = useStateT('');
  const [sortKey, setSortKey] = useStateT('seq');
  const [sortDir, setSortDir] = useStateT('asc');
  const [page, setPage] = useStateT(1);
  const [pageSize, setPageSize] = useStateT(20);
  const [hideDone, setHideDone] = useStateT(true);

  const filtered = useMemoT(() => {
    let arr = K.applyFilters(data, { search, engineer: engF, machine: machF, status: statusF });
    if (matF) arr = arr.filter(d => d.material === matF);
    if (hideDone && !statusF) arr = arr.filter(d => K.statusOf(d) !== 'done' && K.statusOf(d) !== 'cancelled');
    arr = [...arr].sort((a, b) => {
      const dir = sortDir === 'asc' ? 1 : -1;
      const va = a[sortKey], vb = b[sortKey];
      if (typeof va === 'number') return (va - vb) * dir;
      return String(va||'').localeCompare(String(vb||'')) * dir;
    });
    return arr;
  }, [data, search, engF, machF, statusF, matF, sortKey, sortDir]);

  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const safePage = Math.min(page, totalPages);
  const pageData = filtered.slice((safePage-1)*pageSize, safePage*pageSize);

  function toggleSort(key) {
    if (sortKey === key) setSortDir(d => d==='asc'?'desc':'asc');
    else { setSortKey(key); setSortDir('asc'); }
  }

  function SortHeader({ k, children }) {
    const isSorted = sortKey === k;
    return (
      <th className={`sortable${isSorted?' sorted':''}`} onClick={() => toggleSort(k)}>
        {children}<span className="sort-indicator">{isSorted?(sortDir==='asc'?'↑':'↓'):'↕'}</span>
      </th>
    );
  }

  function DueCell({ item }) {
    const st = K.statusOf(item);
    const done = st==='done'||st==='cancelled';
    if (!item.dueDate) return <span className="kt-due" style={{color:'#8a93a3'}}>未訂期</span>;
    const d = K.daysUntil(item.dueDate);
    let cls = 'kt-due', suffix = '';
    if (!done && d!==null) {
      if      (d<0)  { cls+=' kt-due-red';   suffix=` · 逾${-d}d`; }
      else if (d<=3) { cls+=' kt-due-red';   suffix=` · ${d}d`; }
      else if (d<=7) { cls+=' kt-due-amber'; suffix=` · ${d}d`; }
      else           { suffix=` · ${d}d`; }
    }
    return <span className={cls}>{item.dueDate}{suffix}</span>;
  }

  const engineers = window._settings_engineers || K.ENG_ORDER;
  const machines  = window._settings_machines  || K.MACHINES;

  return (
    <div className="table-view">
      <div className="toolbar">
        <div className="toolbar-title">訂單總表</div>
        <span className="toolbar-sub">{total} / {data.length} 筆</span>
        <div className="t-search">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" strokeWidth="1.5"/><path d="M11 11l3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
          <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="搜尋 EF / 客戶"/>
        </div>
        <select className="t-sel" value={statusF} onChange={e=>{setStatusF(e.target.value);setPage(1);}}>
          <option value="">所有狀態</option>
          <option value="todo">待開始</option><option value="blocked">等待材料</option>
          <option value="progress">進行中</option><option value="done">已完成</option><option value="cancelled">已取消</option>
        </select>
        <select className="t-sel" value={engF} onChange={e=>{setEngF(e.target.value);setPage(1);}}>
          <option value="">所有工程師</option>
          {engineers.map(k=><option key={k} value={k}>{K.ENG_LABEL[k]||k}</option>)}
        </select>
        <select className="t-sel" value={machF} onChange={e=>{setMachF(e.target.value);setPage(1);}}>
          <option value="">所有機台</option>
          {machines.map(m=><option key={m} value={m}>{m}</option>)}
        </select>
        <select className="t-sel" value={matF} onChange={e=>{setMatF(e.target.value);setPage(1);}}>
          <option value="">所有材料狀況</option>
          {K.MATERIALS.map(m=><option key={m} value={m}>{m}</option>)}
        </select>
        <button className={`t-pill-btn${!hideDone?' active':''}`} onClick={()=>{setHideDone(v=>!v);setPage(1);}}>
          {hideDone ? '顯示已完成' : '👁 顯示已完成'}
        </button>
        <button className="t-btn" onClick={()=>{setSearch('');setEngF('');setMachF('');setStatusF('');setMatF('');setHideDone(true);setPage(1);}}>清除</button>
      </div>
      <div className="table-wrap">
        <table className="kt">
          <thead><tr>
            <SortHeader k="seq">序列</SortHeader>
            <SortHeader k="id">EF 單號</SortHeader>
            <SortHeader k="customer">客戶名稱</SortHeader>
            <SortHeader k="engineer">執行工程師</SortHeader>
            <SortHeader k="dueDate">期望交期</SortHeader>
            <SortHeader k="startDate">開始日</SortHeader>
            <SortHeader k="endDate">完成日</SortHeader>
            <th>材料</th>
            <SortHeader k="progress">進度</SortHeader>
            <SortHeader k="machine">機台</SortHeader>
            <th>狀態</th>
            <th>備註</th>
          </tr></thead>
          <tbody>
            {pageData.map(it => {
              const st = K.statusOf(it);
              const tone = K.ENG_TONE[it.engineer]||{fg:'#5a6270',bg:'#eef0f3'};
              return (
                <tr key={it._id||it.seq}>
                  <td className="col-seq">{it.seq}</td>
                  <td className="col-id">{it.id}</td>
                  <td className="col-customer">{it.customer}</td>
                  <td><span className="kt-eng"><span className="kt-eng-dot" style={{color:tone.fg,background:tone.bg}}>{K.ENG_INIT[it.engineer]||it.engineer.slice(0,2)}</span>{K.ENG_LABEL[it.engineer]||it.engineer}</span></td>
                  <td className="col-date"><DueCell item={it}/></td>
                  <td className="col-date">{it.startDate||'—'}</td>
                  <td className="col-date">{it.endDate||'—'}</td>
                  <td><span className={it.material==='足夠'?'kt-mat-ok':'kt-mat-need'}>{it.material}</span></td>
                  <td className="col-prog">
                    <div className="kt-prog">
                      <div className="kt-prog-bar"><div className="kt-prog-fill" style={{width:`${it.progress}%`,background:st==='done'?'#1d6f43':st==='cancelled'?'#cbd0d8':'#0c7a99'}}/></div>
                      <span className="kt-prog-num">{it.progress}%</span>
                    </div>
                  </td>
                  <td className="col-machine">{it.machine||'—'}</td>
                  <td><span className={`kt-pill kt-pill-${st}`}>{K.STATUS_TONE[st].label}</span></td>
                  <td style={{color:'#5a6270',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{it.remark||'—'}</td>
                </tr>
              );
            })}
            {pageData.length===0&&<tr><td colSpan="12"><div className="kt-empty">沒有符合條件的訂單</div></td></tr>}
          </tbody>
        </table>
      </div>
      <div className="kt-pagination">
        <div className="kt-pagination-info">
          <span>每頁</span>
          <select className="t-sel" style={{height:26,fontSize:11.5}} value={pageSize} onChange={e=>{setPageSize(+e.target.value);setPage(1);}}>
            <option value="10">10</option><option value="20">20</option><option value="50">50</option>
          </select>
          <span>筆 · 共 {total} 筆</span>
        </div>
        <div className="kt-pagination-pages">
          <button className="kt-page" disabled={safePage<=1} onClick={()=>setPage(safePage-1)}>‹</button>
          {Array.from({length:totalPages}).map((_,i)=>(
            <button key={i} className="kt-page" aria-current={i+1===safePage} onClick={()=>setPage(i+1)}>{i+1}</button>
          ))}
          <button className="kt-page" disabled={safePage>=totalPages} onClick={()=>setPage(safePage+1)}>›</button>
        </div>
      </div>
    </div>
  );
}
window.TableView = TableView;
</script>

<!-- ② KanbanView -->
<script type="text/babel" data-presets="react">
const { useState: useStateK, useMemo: useMemoK } = React;

function KanbanView({ data, setData }) {
  const K = window.K;
  const [search, setSearch] = useStateK('');
  const [engF, setEngF] = useStateK('');
  const [machF, setMachF] = useStateK('');
  const [groupBy, setGroupBy] = useStateK('status');
  const [density, setDensity] = useStateK('comfortable');
  const [open, setOpen] = useStateK(null);
  const [dragItem, setDragItem] = useStateK(null);

  const STATUS_COLUMNS = [
    { key:'todo',     title:'待開始',  hint:'0%, 尚未排程',    tone:'#5a6270' },
    { key:'blocked',  title:'等待材料', hint:'需調撥 / 待客戶', tone:'#c79b2a' },
    { key:'progress', title:'進行中',  hint:'已排程, 列印中',  tone:'#0c7a99' },
    { key:'done',     title:'已完成',  hint:'100% / 出貨',     tone:'#1d6f43' },
    { key:'cancelled',title:'已取消',  hint:'備註含「取消」',  tone:'#9aa3b2' },
  ];
  const PROGRESS_COLUMNS = [
    { key:'0',   title:'0%',   hint:'尚未開始', tone:'#9aa3b2' },
    { key:'25',  title:'25%',  hint:'備料/起印', tone:'#c79b2a' },
    { key:'50',  title:'50%',  hint:'列印中',    tone:'#c79b2a' },
    { key:'75',  title:'75%',  hint:'後處理',    tone:'#0c7a99' },
    { key:'100', title:'100%', hint:'完成',       tone:'#1d6f43' },
  ];
  const ENGINEER_COLUMNS = K.ENG_ORDER.map(k => ({ key:k, title:K.ENG_LABEL[k], hint:k, tone:K.ENG_TONE[k].fg }));
  const MACHINE_COLUMNS  = K.MACHINES.map(k => ({ key:k, title:k, hint:'機台', tone:'#0c7a99' }));

  const cols = groupBy==='status' ? STATUS_COLUMNS : groupBy==='progress' ? PROGRESS_COLUMNS : groupBy==='engineer' ? ENGINEER_COLUMNS : MACHINE_COLUMNS;

  function columnKeyFor(item) {
    if (groupBy==='status')   return K.statusOf(item);
    if (groupBy==='progress') return String(item.progress);
    if (groupBy==='engineer') return item.engineer;
    if (groupBy==='machine')  return item.machine||'—';
    return K.statusOf(item);
  }

  const filtered = useMemoK(() => K.applyFilters(data, { search, engineer:engF, machine:machF }), [data, search, engF, machF]);
  const grouped  = useMemoK(() => {
    const m = {}; cols.forEach(c => { m[c.key] = []; });
    filtered.forEach(it => { const k = columnKeyFor(it); if (m[k]) m[k].push(it); });
    return m;
  }, [filtered, cols, groupBy]);

  const stats = {
    total:   data.length,
    wip:     data.filter(d=>K.statusOf(d)==='progress').length,
    blocked: data.filter(d=>K.statusOf(d)==='blocked').length,
    due7:    data.filter(d=>{ const s=K.statusOf(d); if(s==='done'||s==='cancelled')return false; const du=K.daysUntil(d.dueDate); return du!==null&&du<=7; }).length,
    done:    data.filter(d=>K.statusOf(d)==='done').length,
  };

  function handleDrop(colKey) {
    if (!dragItem) return;
    setData(prev => prev.map(d => {
      if (d.seq !== dragItem.seq) return d;
      const u = {...d};
      if (groupBy==='status') {
        if      (colKey==='done')     { u.progress=100; u.complete='是'; u.remark=(u.remark||'').replace('已取消','').trim(); }
        else if (colKey==='todo')     { u.progress=0;   u.complete='否'; u.remark=(u.remark||'').replace('已取消','').trim(); }
        else if (colKey==='progress') { if(u.progress===0||u.progress===100)u.progress=50; u.complete='否'; u.remark=(u.remark||'').replace('已取消','').trim(); }
        else if (colKey==='blocked')  { u.material='需調撥'; u.complete='否'; }
        else if (colKey==='cancelled'){ u.remark=u.remark?`${u.remark} · 已取消`:'已取消'; }
      } else if (groupBy==='progress') { u.progress=parseInt(colKey,10); u.complete=u.progress===100?'是':'否'; }
      else if (groupBy==='engineer') { u.engineer=colKey; }
      else if (groupBy==='machine')  { u.machine=colKey; }
      return u;
    }));
    setDragItem(null);
  }

  function Avatar({ engineer }) {
    const tone = K.ENG_TONE[engineer]||{fg:'#5a6270',bg:'#eef0f3'};
    return <span className="avatar" style={{color:tone.fg,background:tone.bg}} title={K.ENG_LABEL[engineer]||engineer}>{K.ENG_INIT[engineer]||engineer.slice(0,2)}</span>;
  }

  function DueChip({ dateStr, isDone }) {
    if (!dateStr) return <span className="chip chip-muted">未訂期</span>;
    const d = K.daysUntil(dateStr);
    if (isDone) return <span className="chip chip-muted">{dateStr.slice(5)}</span>;
    let cls='chip', label=dateStr.slice(5);
    if      (d<0)  { cls+=' chip-red';   label=`逾期 ${-d}d`; }
    else if (d<=3) { cls+=' chip-red';   label=`${dateStr.slice(5)} · ${d}d`; }
    else if (d<=7) { cls+=' chip-amber'; label=`${dateStr.slice(5)} · ${d}d`; }
    else           { cls+=' chip-muted'; label=`${dateStr.slice(5)} · ${d}d`; }
    return <span className={cls}>{label}</span>;
  }

  function Card({ item }) {
    const st = K.statusOf(item);
    const done = st==='done', cancelled = st==='cancelled';
    return (
      <div className={`card${density==='compact'?' card-compact':''}${dragItem&&dragItem.seq===item.seq?' card-dragging':''}${cancelled?' card-cancelled':''}`}
        draggable onDragStart={()=>setDragItem(item)} onDragEnd={()=>setDragItem(null)} onClick={()=>setOpen(item)}>
        <div className="card-top">
          <span className="card-id">EF · {item.id ? item.id.slice(-7) : '—'}</span>
          <div className="card-top-right">
            {item.material==='需調撥'&&<span className="dot dot-amber"/>}
            <Avatar engineer={item.engineer}/>
          </div>
        </div>
        <div className="card-title">{item.customer}</div>
        {density!=='compact'&&(
          <div className="card-meta">
            <span className="meta-machine">{item.machine||'未指派機台'}</span>
            {item.remark&&<span className="meta-remark" title={item.remark}>· {item.remark}</span>}
          </div>
        )}
        <div className="card-progress">
          <div className="progress-track"><div className="progress-fill" style={{width:`${item.progress}%`,background:done?'#1d6f43':cancelled?'#cbd0d8':'#0c7a99'}}/></div>
          <span className="progress-num">{item.progress}%</span>
        </div>
        <div className="card-foot">
          <DueChip dateStr={item.dueDate} isDone={done}/>
          <span className="seq-num">#{String(item.seq).padStart(3,'0')}</span>
        </div>
      </div>
    );
  }

  function Column({ col, items }) {
    const [over, setOver] = useStateK(false);
    return (
      <div className={`col${over?' col-over':''}`}
        onDragOver={e=>{e.preventDefault();setOver(true);}}
        onDragLeave={()=>setOver(false)}
        onDrop={()=>{setOver(false);handleDrop(col.key);}}>
        <div className="col-head">
          <div className="col-head-left">
            <span className="col-dot" style={{background:col.tone}}/>
            <span className="col-title">{col.title}</span>
            <span className="col-count">{items.length}</span>
          </div>
          <span className="col-hint">{col.hint}</span>
        </div>
        <div className="col-body">
          {items.map(it=><Card key={it.seq} item={it}/>)}
          {items.length===0&&<div className="col-empty">—</div>}
        </div>
      </div>
    );
  }

  function Drawer() {
    if (!open) return null;
    const tone = K.ENG_TONE[open.engineer]||{fg:'#5a6270',bg:'#eef0f3'};
    return (
      <div className="drawer-wrap" onClick={()=>setOpen(null)}>
        <aside className="drawer" onClick={e=>e.stopPropagation()}>
          <header className="drawer-head">
            <div>
              <div className="drawer-eyebrow">EF 訂單詳情</div>
              <div className="drawer-id">{open.id||'—'}</div>
            </div>
            <button className="icon-btn" onClick={()=>setOpen(null)}>×</button>
          </header>
          <div className="drawer-customer">{open.customer}</div>
          <div className="drawer-row">
            <div className="drawer-field">
              <div className="field-label">執行工程師</div>
              <div className="field-value">
                <span className="avatar" style={{color:tone.fg,background:tone.bg,marginRight:8}}>{K.ENG_INIT[open.engineer]||open.engineer.slice(0,2)}</span>
                {K.ENG_LABEL[open.engineer]||open.engineer}
              </div>
            </div>
            <div className="drawer-field">
              <div className="field-label">機台</div>
              <div className="field-value mono">{open.machine||'—'}</div>
            </div>
          </div>
          <div className="drawer-row">
            <div className="drawer-field">
              <div className="field-label">期望交期</div>
              <div className="field-value mono">{open.dueDate||'—'}</div>
            </div>
            <div className="drawer-field">
              <div className="field-label">材料庫存</div>
              <div className="field-value">
                <span className={open.material==='足夠'?'pill pill-ok':'pill pill-amber'}>{open.material}</span>
              </div>
            </div>
          </div>
          <div className="drawer-row">
            <div className="drawer-field">
              <div className="field-label">開始日</div>
              <div className="field-value mono">{open.startDate||'—'}</div>
            </div>
            <div className="drawer-field">
              <div className="field-label">預計完成日</div>
              <div className="field-value mono">{open.endDate||'—'}</div>
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <div className="field-label">進度</div>
            <div className="card-progress" style={{marginTop:8}}>
              <div className="progress-track" style={{height:6}}>
                <div className="progress-fill" style={{width:`${open.progress}%`}}/>
              </div>
              <span className="progress-num">{open.progress}%</span>
            </div>
          </div>
          {open.remark&&(
            <div>
              <div className="field-label">備註</div>
              <div className="remark-box" style={{marginTop:6}}>{open.remark}</div>
            </div>
          )}
          <div className="drawer-foot">
            <span>#{String(open.seq).padStart(3,'0')}</span>
            <span>{open.complete==='是'?'✅ 已完成':'未完成'}</span>
          </div>
        </aside>
      </div>
    );
  }

  const engineers = window._settings_engineers||K.ENG_ORDER;
  const machines  = window._settings_machines||K.MACHINES;

  return (
    <div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0}}>
      <div className="kpi-strip">
        {[
          {label:'總訂單',   value:stats.total},
          {label:'進行中',   value:stats.wip},
          {label:'等待材料', value:stats.blocked},
          {label:'7天內到期',value:stats.due7},
          {label:'已完成',   value:stats.done},
        ].map(k=>(
          <div key={k.label} className="kpi-cell">
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value">{k.value}</div>
          </div>
        ))}
      </div>
      <div className="toolbar">
        <div className="t-search">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" strokeWidth="1.5"/><path d="M11 11l3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋 EF / 客戶"/>
        </div>
        <select className="t-sel" value={engF} onChange={e=>setEngF(e.target.value)}>
          <option value="">所有工程師</option>
          {engineers.map(k=><option key={k} value={k}>{K.ENG_LABEL[k]||k}</option>)}
        </select>
        <select className="t-sel" value={machF} onChange={e=>setMachF(e.target.value)}>
          <option value="">所有機台</option>
          {machines.map(m=><option key={m} value={m}>{m}</option>)}
        </select>
        <div className="seg">
          {[['status','狀態'],['progress','進度'],['engineer','工程師'],['machine','機台']].map(([g,l])=>(
            <button key={g} className={`seg-btn${groupBy===g?' active':''}`} onClick={()=>setGroupBy(g)}>{l}</button>
          ))}
        </div>
        <div className="seg">
          {[['comfortable','標準'],['compact','緊湊']].map(([d,l])=>(
            <button key={d} className={`seg-btn${density===d?' active':''}`} onClick={()=>setDensity(d)}>{l}</button>
          ))}
