      <div className="board">
        {cols.map(col=><Column key={col.key} col={col} items={grouped[col.key]||[]}/>)}
      </div>
      <Drawer/>
    </div>
  );
}
window.KanbanView = KanbanView;
</script>

<!-- ③ GanttView -->
<script type="text/babel" data-presets="react">
function GanttView({ data }) {
  const K = window.K;
  const { useState: useStateG, useMemo: useMemoG, useRef: useRefG, useEffect: useEffectG } = React;
  const [engF, setEngF] = useStateG('');
  const [statusF, setStatusF] = useStateG('');
  const [showDone, setShowDone] = useStateG(false);
  const [tooltip, setTooltip] = useStateG(null); // { item, x, y }
  const ganttRef = useRefG(null);
  const filtered = useMemoG(() => {
    let d = data;
    if (!showDone) d = d.filter(x => K.statusOf(x) !== 'done');
    if (engF) d = d.filter(x => x.engineer === engF);
    if (statusF) d = d.filter(x => K.statusOf(x) === statusF);
    return d;
  }, [data, engF, statusF, showDone]);
  const today = K.TODAY;
  const DAY = K.DAY;
  const DAY_W = 22;

  const { startD, days } = useMemoG(() => {
    const all = [];
    filtered.forEach(d => {
      if (d.startDate) all.push(new Date(d.startDate));
      if (d.endDate)   all.push(new Date(d.endDate));
      if (d.dueDate)   all.push(new Date(d.dueDate));
    });
    all.push(today);
    if (!all.length) return { startD: today, days: 60 };
    const min = new Date(Math.min(...all.map(d=>d.getTime())));
    const max = new Date(Math.max(...all.map(d=>d.getTime())));
    min.setDate(min.getDate()-7);
    max.setDate(max.getDate()+14);
    const days = Math.round((max-min)/DAY)+1;
    return { startD: min, days };
  }, [filtered]);

  const todayOffset = Math.round((today-startD)/DAY);

  // 自動捲動到當月（初始化時）
  useEffectG(() => {
    if (!ganttRef.current) return;
    const scrollX = Math.max(0, todayOffset * DAY_W - 160);
    ganttRef.current.scrollLeft = scrollX;
  }, [startD, todayOffset]);

  function dayOffset(dateStr) {
    if (!dateStr) return null;
    return Math.round((new Date(dateStr)-startD)/DAY);
  }

  const months = useMemoG(() => {
    const m = []; let cur=null, count=0, startIdx=0;
    for (let i=0; i<days; i++) {
      const d = new Date(startD.getTime()+i*DAY);
      const key = `${d.getFullYear()}-${d.getMonth()}`;
      if (key!==cur) { if(cur!==null)m.push({label:cur,count,startIdx}); cur=key; count=1; startIdx=i; }
      else count++;
    }
    if (cur!==null) m.push({label:cur,count,startIdx});
    return m.map(m2 => {
      const d = new Date(startD.getTime()+m2.startIdx*DAY);
      return {...m2, label:`${d.getFullYear()}/${d.getMonth()+1}`};
    });
  }, [startD, days]);

  const engineers = window._settings_engineers||K.ENG_ORDER;

  return (
    <div style={{display:'flex',flexDirection:'column',flex:1,minHeight:0,overflow:'hidden'}}>
      <div className="toolbar">
        <span className="toolbar-title">時間軸</span>
        <span className="toolbar-sub">{filtered.length} 筆工作</span>
        <div className="toolbar-divider"/>
        <select className="t-sel-pill" value={engF} onChange={e=>setEngF(e.target.value)}>
          <option value="">所有工程師</option>
          {engineers.map(k=><option key={k} value={k}>{K.ENG_LABEL[k]||k}</option>)}
        </select>
        <select className="t-sel-pill" value={statusF} onChange={e=>setStatusF(e.target.value)}>
          <option value="">所有進度</option>
          <option value="todo">待處理</option>
          <option value="progress">進行中</option>
          <option value="blocked">封鎖中</option>
          <option value="cancelled">已取消</option>
        </select>
        <button className={`t-pill-btn${showDone?' active':''}`} onClick={()=>setShowDone(v=>!v)}>
          {showDone ? '👁 顯示已完成' : '顯示已完成'}
        </button>
      </div>
      <div className="gantt" ref={ganttRef}>
        <div className="gantt-left">
          <div className="lane-head-sticky">工作 / 客戶</div>
          {filtered.map((d,i)=>{
            const tone=K.ENG_TONE[d.engineer]||{fg:'#5a6270',bg:'#eef0f3'};
            const st = K.statusOf(d);
            const statusLabel = {done:'已完成',progress:'進行中',blocked:'等待材料',todo:'待處理',cancelled:'已取消'}[st]||st;
            return (
              <div key={d._id||d.seq} className="lane" style={{background:i%2?'var(--bg-soft)':'var(--bg)',cursor:'default'}}
                onMouseEnter={e=>{setTooltip({item:d,x:e.clientX+14,y:e.clientY-20})}}
                onMouseMove={e=>{setTooltip(v=>v?{...v,x:e.clientX+14,y:e.clientY-20}:v)}}
                onMouseLeave={()=>setTooltip(null)}
              >
                <span className="lane-avatar" style={{color:tone.fg,background:tone.bg}}>{K.ENG_INIT[d.engineer]||d.engineer.slice(0,2)}</span>
                <div className="lane-meta">
                  <span className="lane-name" style={{fontSize:12}}>{d.customer}</span>
                  <span className="lane-sub">{d.dueDate}</span>
                </div>
              </div>
            );
          })}
        </div>
        <div className="gantt-right" style={{position:'relative',minWidth:days*DAY_W}}>
          <div className="scale" style={{height:48}}>
            <div className="scale-months">
              {months.map((m,i)=>(
                <div key={i} className="scale-month" style={{width:m.count*DAY_W,flexShrink:0}}>{m.label}</div>
              ))}
            </div>
            <div className="scale-days">
              {Array.from({length:days}).map((_,i)=>{
                const d=new Date(startD.getTime()+i*DAY);
                const dow=d.getDay();
                const isWeekend=dow===0||dow===6;
                const isToday=i===todayOffset;
                return <div key={i} className={`scale-day${isWeekend?' weekend':''}${isToday?' is-today':''}`} style={{width:DAY_W,flexShrink:0}}>{d.getDate()}</div>;
              })}
            </div>
          </div>
          {filtered.map((item,rowIdx)=>{
            const st=K.statusOf(item);
            const s=dayOffset(item.startDate);
            const e=dayOffset(item.endDate||item.dueDate);
            const due=dayOffset(item.dueDate);
            const hasBar=s!==null&&e!==null&&e>=s;
            return (
              <div key={item._id||item.seq} className={`row${rowIdx%2?' alt':''}`} style={{height:56,position:'relative'}}>
                {Array.from({length:days}).map((_,i)=>{
                  const d=new Date(startD.getTime()+i*DAY);
                  const isWeekend=d.getDay()===0||d.getDay()===6;
                  return <div key={i} style={{position:'absolute',left:i*DAY_W,top:0,bottom:0,width:DAY_W,borderRight:'1px solid var(--line-soft)',background:isWeekend?'rgba(10,14,20,0.018)':'transparent'}}/>;
                })}
                <div className="today-line" style={{left:todayOffset*DAY_W+DAY_W/2}}/>
                {hasBar&&(
                  <div className={`bar ${st}`} style={{left:s*DAY_W,width:Math.max(1,(e-s+1))*DAY_W-2,top:'50%',transform:'translateY(-50%)'}}
                    onMouseEnter={e2=>{setTooltip({item,x:e2.clientX+14,y:e2.clientY-20})}}
                    onMouseMove={e2=>{setTooltip(v=>v?{...v,x:e2.clientX+14,y:e2.clientY-20}:v)}}
                    onMouseLeave={()=>setTooltip(null)}
                  >
                    <div className="bar-fill" style={{width:`${item.progress}%`}}/>
                    <span className="bar-text">{item.customer}</span>
                    {due!==null&&due>e&&<div className="bar-due-marker"/>}
                  </div>
                )}
                {!hasBar&&due!==null&&(
                  <div className={`bar todo`} style={{left:due*DAY_W,width:DAY_W-2,top:'50%',transform:'translateY(-50%)',fontSize:9,justifyContent:'center'}}
                    onMouseEnter={e2=>{setTooltip({item,x:e2.clientX+14,y:e2.clientY-20})}}
                    onMouseMove={e2=>{setTooltip(v=>v?{...v,x:e2.clientX+14,y:e2.clientY-20}:v)}}
                    onMouseLeave={()=>setTooltip(null)}
                  >▼</div>
                )}
              </div>
            );
          })}
        </div>
      </div>
      {tooltip&&(()=>{
        const d=tooltip.item;
        const K2=window.K;
        const st=K2.statusOf(d);
        const statusLabel={done:'已完成',progress:'進行中',blocked:'等待材料',todo:'待處理',cancelled:'已取消'}[st]||st;
        const statusColor={done:'#1d6f43',progress:'#0c7a99',blocked:'#8b6b13',todo:'#5a6270',cancelled:'#8a93a3'}[st]||'#5a6270';
        const engLabel=K2.ENG_LABEL[d.engineer]||d.engineer;
        const tone=K2.ENG_TONE[d.engineer]||{fg:'#5a6270',bg:'#eef0f3'};
        const today2=K2.TODAY;
        const dueMs=d.dueDate?new Date(d.dueDate)-today2:null;
        const dueDay=dueMs!==null?Math.round(dueMs/K2.DAY):null;
        const dueText=dueDay===null?'—':dueDay<0?`逾期 ${-dueDay} 天`:dueDay===0?'今天到期':`還有 ${dueDay} 天`;
        const dueCol=dueDay!==null&&dueDay<0?'#c0392b':dueDay!==null&&dueDay<7?'#c79b2a':'var(--ink-2)';
        // clamp position so tooltip stays in viewport
        const tipH=200; const tipW=230;
        const yPos=Math.min(tooltip.y, window.innerHeight-tipH-12);
        const xPos=Math.min(tooltip.x, window.innerWidth-tipW-12);
        return (
          <div style={{
            position:'fixed',left:xPos,top:yPos,zIndex:9999,
            background:'#fff',border:'1px solid var(--line)',borderRadius:10,
            boxShadow:'0 8px 24px rgba(10,14,20,0.13)',
            padding:'12px 14px',width:230,pointerEvents:'none',
            fontFamily:'var(--font-ui)',fontSize:12
          }}>
            <div style={{fontWeight:700,fontSize:13,color:'var(--ink)',marginBottom:8,lineHeight:1.3}}>{d.customer}</div>
            <div style={{display:'flex',flexDirection:'column',gap:5,color:'var(--ink-2)'}}>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--ink-4)'}}>單號</span>
                <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--accent)'}}>{d.orderId||d._id||'—'}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--ink-4)'}}>工程師</span>
                <span style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{width:16,height:16,borderRadius:'50%',background:tone.bg,color:tone.fg,fontSize:9,fontWeight:700,display:'inline-flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-mono)'}}>{K2.ENG_INIT[d.engineer]||d.engineer.slice(0,2)}</span>
                  {engLabel}
                </span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--ink-4)'}}>機台</span>
                <span style={{fontFamily:'var(--font-mono)',fontSize:11}}>{d.machine||'—'}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--ink-4)'}}>交期</span>
                <span style={{color:dueCol,fontFamily:'var(--font-mono)',fontSize:11}}>{d.dueDate||'—'}<span style={{marginLeft:5,fontSize:10,opacity:.8}}>{dueText}</span></span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--ink-4)'}}>進度</span>
                <span style={{color:'var(--ink-2)'}}>{d.progress||0}%</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{color:'var(--ink-4)'}}>狀態</span>
                <span style={{background:statusColor,color:'#fff',borderRadius:999,padding:'1px 8px',fontSize:10,fontFamily:'var(--font-mono)',fontWeight:600}}>{statusLabel}</span>
              </div>
              {d.material&&<div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:'var(--ink-4)'}}>材料</span>
                <span>{d.material}</span>
              </div>}
            </div>
          </div>
        );
      })()}
    </div>
  );
}
window.GanttView = GanttView;
</script>

<!-- ④ DashboardView -->
<script type="text/babel" data-presets="react">
function DashboardView({ data }) {
  const K = window.K;
  const { useMemo, useState } = React;

  const STATUS_COLORS = { todo:'#cbd0d8', blocked:'#c79b2a', progress:'#0c7a99', done:'#1d6f43', cancelled:'#b0b5bf' };
  const ENG_COLORS = ['#0c7a99','#6b3fa0','#1d6f43','#a05a00','#c0392b','#2471a3'];
  const MACH_COLORS = ['#0c7a99','#1d6f43','#c79b2a','#6b3fa0'];

  // ── KPI 統計 ──
  const stats = useMemo(() => {
    const total    = data.length;
    const wip      = data.filter(d=>K.statusOf(d)==='progress').length;
    const blocked  = data.filter(d=>K.statusOf(d)==='blocked').length;
    const done     = data.filter(d=>K.statusOf(d)==='done').length;
    const due7     = data.filter(d=>{ const s=K.statusOf(d); if(s==='done'||s==='cancelled')return false; const v=K.daysUntil(d.dueDate); return v!==null&&v<=7&&v>=0; }).length;
    const statusDist = {
      todo:      data.filter(d=>K.statusOf(d)==='todo').length,
      blocked,
      progress:  wip,
      done,
      cancelled: data.filter(d=>K.statusOf(d)==='cancelled').length,
    };
    const engineers = window._settings_engineers||K.ENG_ORDER;
    const machines  = window._settings_machines||K.MACHINES;
    const byEng={}, byMach={}, byProg={0:0,25:0,50:0,75:0,100:0}, byMat={};
    engineers.forEach(k=>{byEng[k]=0;}); machines.forEach(m=>{byMach[m]=0;});
    data.forEach(d=>{
      if(d.engineer) byEng[d.engineer]=(byEng[d.engineer]||0)+1;
      if(d.machine)  byMach[d.machine]=(byMach[d.machine]||0)+1;
      const p = K.PROGRESS_VALUES.includes(d.progress)?d.progress:0;
      byProg[p]=(byProg[p]||0)+1;
      const mat=d.material||'足夠'; byMat[mat]=(byMat[mat]||0)+1;
    });
    const byCustomer={};
    data.forEach(d=>{ const c=d.customer||'—'; byCustomer[c]=(byCustomer[c]||0)+1; });
    return { total,wip,blocked,done,due7,statusDist,byEng,byMach,byProg,byMat,byCustomer,engineers,machines };
  }, [data]);

  // ── 圖表元件 ──
  function DonutChart({ slices, centerLabel }) {
    const total = slices.reduce((s,x)=>s+x.value,0);
    if (!total) return <div className="chart-empty">無資料</div>;
    const R=68, cx=90, cy=90, thick=20;
    let acc=0;
    const paths=slices.filter(s=>s.value>0).map(sl=>{
      const pct=sl.value/total;
      const s0=acc*2*Math.PI-Math.PI/2; acc+=pct; const s1=acc*2*Math.PI-Math.PI/2;
      const large=pct>0.5?1:0;
      const x1=cx+R*Math.cos(s0),y1=cy+R*Math.sin(s0),x2=cx+R*Math.cos(s1),y2=cy+R*Math.sin(s1);
      return <path key={sl.label} d={`M${cx} ${cy} L${x1} ${y1} A${R} ${R} 0 ${large} 1 ${x2} ${y2}Z`} fill={sl.color} stroke="#fff" strokeWidth="2"/>;
    });
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:12,width:'100%'}}>
        <div style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="180" height="180" viewBox="0 0 180 180">
            {paths}
            <circle cx={cx} cy={cy} r={R-thick} fill="#fff"/>
          </svg>
          <div style={{position:'absolute',textAlign:'center',pointerEvents:'none'}}>
            <div style={{fontSize:28,fontWeight:700,fontFamily:'var(--font-mono)',letterSpacing:'-0.02em',color:'var(--ink)',lineHeight:1}}>{total}</div>
            <div style={{fontSize:10,color:'var(--ink-4)',fontFamily:'var(--font-mono)',marginTop:3,letterSpacing:'0.06em',textTransform:'uppercase'}}>{centerLabel||'總計'}</div>
          </div>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'4px 10px',justifyContent:'center',fontSize:10.5,color:'var(--ink-3)',fontFamily:'var(--font-mono)'}}>
          {slices.filter(s=>s.value>0).map(s=>(
            <span key={s.label} style={{display:'inline-flex',alignItems:'center',gap:4}}>
              <span style={{width:8,height:8,borderRadius:2,background:s.color,flexShrink:0}}/>
              {s.label} · {s.value}
            </span>
          ))}
        </div>
      </div>
    );
  }

  function HBarChart({ items, colorFn }) {
    const max = Math.max(1,...items.map(i=>i.value));
    return (
      <div style={{display:'flex',flexDirection:'column',gap:10,width:'100%',padding:'4px 0'}}>
        {items.filter(i=>i.value>0).map((item,idx)=>(
          <div key={item.label} style={{display:'grid',gridTemplateColumns:'90px 1fr 28px',gap:10,alignItems:'center'}}>
            <span style={{fontSize:11.5,color:'var(--ink-2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.label}</span>
            <div style={{height:14,background:'var(--bg-soft)',borderRadius:4,overflow:'hidden',position:'relative'}}>
              <div style={{position:'absolute',inset:'0 auto 0 0',borderRadius:4,transition:'width .3s',background:colorFn?colorFn(item,idx):'var(--accent)',width:`${Math.round(item.value/max*100)}%`}}/>
            </div>
            <span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--ink-2)',textAlign:'right'}}>{item.value}</span>
          </div>
        ))}
        {items.every(i=>i.value===0)&&<div className="chart-empty">無資料</div>}
      </div>
    );
  }

  function VBarChart({ items, colorFn }) {
    const max = Math.max(1,...items.map(i=>i.value));
    const H = 140;
    return (
      <div style={{width:'100%',display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
        <svg width="100%" height={H+30} viewBox={`0 0 ${items.length*56} ${H+30}`} preserveAspectRatio="xMidYMid meet">
          {[0,Math.ceil(max/2),max].map((v,i)=>{
            const y=H-Math.round(v/max*H);
            return <g key={i}><line x1={0} y1={y} x2={items.length*56} y2={y} stroke="var(--line-soft)" strokeWidth="1"/><text x={-2} y={y+4} fontSize="9" fill="var(--ink-4)" textAnchor="end">{v}</text></g>;
          })}
          {items.map((item,idx)=>{
            const bw=34, bx=idx*56+11;
            const bh=max>0?Math.max(2,Math.round(item.value/max*H)):0;
            const by=H-bh;
            const fill=colorFn?colorFn(item,idx):'var(--accent)';
            return (
              <g key={item.label}>
                <rect x={bx} y={by} width={bw} height={bh} fill={fill} rx="3"/>
                {item.value>0&&<text x={bx+bw/2} y={by-4} fontSize="9" fill="var(--ink-3)" textAnchor="middle">{item.value}</text>}
                <text x={bx+bw/2} y={H+14} fontSize="9" fill="var(--ink-4)" textAnchor="middle">{item.label}</text>
              </g>
            );
          })}
        </svg>
      </div>
    );
  }

  // ── 自由分析 ──
  const DIM_OPTIONS = [
    { key:'status',   label:'依 狀態' },
    { key:'engineer', label:'依 工程師' },
    { key:'progress', label:'依 進度' },
    { key:'machine',  label:'依 機台' },
    { key:'material', label:'依 材料' },
    { key:'customer', label:'依 客戶（Top 8）' },
  ];
  const CHART_OPTIONS = [
    { key:'donut', label:'環狀圖' },
    { key:'hbar',  label:'橫條圖' },
    { key:'vbar',  label:'直條圖' },
  ];

  function buildSlices(dim) {
    switch(dim) {
      case 'status': return Object.entries(stats.statusDist).map(([k,v],i)=>({ label:K.STATUS_TONE[k]?.label||k, value:v, color:STATUS_COLORS[k] }));
      case 'engineer': return stats.engineers.map((k,i)=>({ label:K.ENG_LABEL[k]||k, value:stats.byEng[k]||0, color:ENG_COLORS[i%ENG_COLORS.length] }));
      case 'progress': return K.PROGRESS_VALUES.map((p,i)=>({ label:`${p}%`, value:stats.byProg[p]||0, color:MACH_COLORS[i%MACH_COLORS.length] }));
      case 'machine':  return stats.machines.map((m,i)=>({ label:m, value:stats.byMach[m]||0, color:MACH_COLORS[i%MACH_COLORS.length] }));
      case 'material': return Object.entries(stats.byMat).map(([k,v],i)=>({ label:k, value:v, color:i===0?'#1d6f43':'#c79b2a' }));
      case 'customer': {
        const sorted=Object.entries(stats.byCustomer).sort((a,b)=>b[1]-a[1]).slice(0,8);
        return sorted.map(([k,v],i)=>({ label:k, value:v, color:'#0c7a99' }));
      }
      default: return [];
    }
  }

  function CustomChart({ idx }) {
    const [dim,   setDim]   = useState(idx===0?'machine':idx===1?'material':'customer');
    const [chart, setChart] = useState(idx===2?'hbar':'donut');
    const slices = buildSlices(dim);
    const colorFn = (item, i) => slices[i]?.color || 'var(--accent)';
    const centerLabel = DIM_OPTIONS.find(d=>d.key===dim)?.label.replace('依 ','');

    const SEL = { height:32, padding:'0 26px 0 10px', border:'1px solid var(--line)', borderRadius:6, background:'var(--bg)', color:'var(--ink-2)', font:'inherit', fontSize:12.5, cursor:'pointer', WebkitAppearance:'none', appearance:'none', backgroundImage:"url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 4l3 3 3-3' fill='none' stroke='%235a6270' stroke-width='1.4'/></svg>\")", backgroundRepeat:'no-repeat', backgroundPosition:'right 7px center', flex:1, minWidth:0 };

    return (
      <div style={{border:'1px solid var(--line)',borderRadius:8,background:'var(--bg)',padding:'14px 16px 18px',display:'flex',flexDirection:'column',gap:14}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,color:'var(--accent)',marginRight:2}}>⊕</span>
          <span style={{fontSize:12.5,fontWeight:600,color:'var(--ink)'}}>自由分析 #{idx+1}</span>
        </div>
        <div style={{display:'flex',gap:8}}>
          <select style={SEL} value={dim} onChange={e=>setDim(e.target.value)}>
            {DIM_OPTIONS.map(d=><option key={d.key} value={d.key}>{d.label}</option>)}
          </select>
          <select style={SEL} value={chart} onChange={e=>setChart(e.target.value)}>
            {CHART_OPTIONS.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}
          </select>
        </div>
        <div style={{display:'flex',justifyContent:'center',alignItems:'center',minHeight:200}}>
          {chart==='donut' && <DonutChart slices={slices} centerLabel={centerLabel}/>}
          {chart==='hbar'  && <HBarChart  items={slices} colorFn={colorFn}/>}
          {chart==='vbar'  && <VBarChart  items={slices} colorFn={colorFn}/>}
        </div>
      </div>
    );
  }

  // ── 預設固定圖表 ──
  const statusSlices  = Object.entries(stats.statusDist).map(([k,v])=>({ label:K.STATUS_TONE[k]?.label||k, value:v, color:STATUS_COLORS[k] }));
  const engItems      = stats.engineers.map((k,i)=>({ label:K.ENG_LABEL[k]||k, value:stats.byEng[k]||0, color:ENG_COLORS[i%ENG_COLORS.length] }));
  const progItems     = K.PROGRESS_VALUES.map((p,i)=>({ label:`${p}%`, value:stats.byProg[p]||0, color:MACH_COLORS[i%MACH_COLORS.length] }));

  const CARD = { border:'1px solid var(--line)', borderRadius:8, background:'var(--bg)', padding:'14px 16px 18px', display:'flex', flexDirection:'column', gap:12 };
  const CARD_HEAD = { display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 };
  const CARD_TITLE = { fontSize:12.5, fontWeight:600, color:'var(--ink)' };
  const CARD_BADGE = { fontSize:10, fontFamily:'var(--font-mono)', color:'var(--ink-4)', letterSpacing:'0.06em', textTransform:'uppercase' };

  return (
    <div style={{flex:1,overflow:'auto',padding:'0 28px 32px',background:'var(--bg)'}}>

      {/* KPI */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:0,borderBottom:'1px solid var(--line)',margin:'0 -28px 0',padding:'0 28px'}}>
        {[
          { label:'總訂單',    value:stats.total,  sub:'全部資料筆數',          color:'var(--ink)' },
          { label:'進行中',    value:stats.wip,    sub:'已開工未完成',          color:'var(--ink)' },
          { label:'等待材料',  value:stats.blocked,sub:'需調撥 / 待備料',       color:'#c79b2a'    },
          { label:'7 天內到期',value:stats.due7,   sub:'未完成且交期 ≤ 7 天',  color:'#c0392b'    },
          { label:'已完成',    value:stats.done,   sub:'100% / 完成',          color:'#1d6f43'    },
        ].map((k,i)=>(
          <div key={k.label} style={{padding:'18px 24px 20px',borderRight:i<4?'1px solid var(--line-soft)':'none'}}>
            <div style={{fontSize:11,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--ink-4)',fontWeight:600,fontFamily:'var(--font-mono)'}}>{k.label}</div>
            <div style={{fontSize:32,fontWeight:700,fontFamily:'var(--font-mono)',letterSpacing:'-0.02em',color:k.color,marginTop:4,lineHeight:1.1}}>{k.value}</div>
            <div style={{fontSize:11,color:'var(--ink-4)',marginTop:4,fontFamily:'var(--font-mono)'}}>{k.sub}</div>
          </div>
        ))}
      </div>

      {/* 預設分析 */}
      <div style={{display:'flex',alignItems:'baseline',gap:10,padding:'20px 0 14px'}}>
        <span style={{fontSize:14,fontWeight:700,color:'var(--ink)'}}>預設分析</span>
        <span style={{fontSize:10.5,color:'var(--ink-4)',fontFamily:'var(--font-mono)',letterSpacing:'0.06em',textTransform:'uppercase'}}>DEFAULT VIEWS</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:32}}>

        {/* 狀態分布 Donut */}
        <div style={CARD}>
          <div style={CARD_HEAD}>
            <span style={CARD_TITLE}>狀態分布</span>
            <span style={CARD_BADGE}>DONUT</span>
          </div>
          <div style={{display:'flex',justifyContent:'center',alignItems:'center',flex:1,minHeight:220}}>
            <DonutChart slices={statusSlices} centerLabel="總訂單"/>
          </div>
        </div>

        {/* 工程師負荷 HBar */}
        <div style={CARD}>
          <div style={CARD_HEAD}>
            <span style={CARD_TITLE}>工程師負荷</span>
            <span style={CARD_BADGE}>HORIZONTAL BAR</span>
          </div>
          <div style={{display:'flex',alignItems:'center',flex:1,minHeight:220}}>
            <HBarChart items={engItems} colorFn={(item,i)=>ENG_COLORS[i%ENG_COLORS.length]}/>
          </div>
        </div>

        {/* 進度分布 VBar */}
        <div style={CARD}>
          <div style={CARD_HEAD}>
            <span style={CARD_TITLE}>進度分布</span>
            <span style={CARD_BADGE}>VERTICAL BAR</span>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',flex:1,minHeight:220}}>
            <VBarChart items={progItems} colorFn={(item,i)=>MACH_COLORS[i%MACH_COLORS.length]}/>
          </div>
        </div>
      </div>

      {/* 自由分析 */}
      <div style={{display:'flex',alignItems:'baseline',gap:10,padding:'4px 0 14px'}}>
        <span style={{fontSize:14,fontWeight:700,color:'var(--ink)'}}>自由分析</span>
        <span style={{fontSize:10.5,color:'var(--ink-4)',fontFamily:'var(--font-mono)',letterSpacing:'0.06em',textTransform:'uppercase'}}>CUSTOM — 選擇維度與圖表類型</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        <CustomChart idx={0}/>
        <CustomChart idx={1}/>
        <CustomChart idx={2}/>
      </div>
    </div>
  );
}
window.DashboardView = DashboardView;
</script>

<!-- ⑦ 主 App -->
<script type="text/babel" data-presets="react">
const { useState: useStateApp, useEffect: useEffectApp } = React;

function LoginPage({ onLogin }) {
  const [email, setEmail] = useStateApp('');
  const [pw, setPw] = useStateApp('');
  const [err, setErr] = useStateApp('');
  const [busy, setBusy] = useStateApp(false);

  const submit = async (e) => {
    e.preventDefault();
    if (!email || !pw) { setErr('請填寫帳號與密碼'); return; }
    setBusy(true); setErr('');
    try {
      const cred = await FBAuth.signIn(email, pw);
      const user = await FBAuth.getUser(cred.user.uid);
      if (!user || !user.active) { await FBAuth.signOut(); setErr('帳號未啟用，請聯絡管理員'); setBusy(false); return; }
      onLogin(user);
    } catch(ex) {
      setErr('帳號或密碼錯誤');
      setBusy(false);
    }
  };

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-brand">
          <div className="login-brand-mark"/>
          <h1>3D 列印管理平台</h1>
          <p>SWTC · PORTAL v3</p>
        </div>
        {err && <div className="login-err show">{err}</div>}
        <form onSubmit={submit}>
          <div className="login-fg"><label>電子郵件</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" autoFocus/></div>
          <div className="login-fg"><label>密碼</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"/></div>
          <button className="login-submit" type="submit" disabled={busy}>{busy?'登入中...':'登入'}</button>
        </form>
      </div>
    </div>
  );
}

/* 使用者 Modal — 獨立元件，使用 React.useState 避免 Hooks alias 問題 */
function UserModal({ item, onClose, onSaved }) {
  const PERMS   = window.PERMS_MAP   || {};
  const PRESETS = window.ROLE_PRESETS || {};
  const INP = { width:'100%', padding:'8px 11px', border:'1.5px solid #e6e8ec', borderRadius:6, fontSize:13, fontFamily:'inherit', outline:'none' };
  const LBL = { display:'block', fontSize:11.5, fontWeight:600, color:'#5a6270', marginBottom:5 };

  const empty = { displayName:'', email:'', password:'', permissions:['view_board','view_issues'], active:true };
  const [form, setForm] = React.useState(item ? {...item, password:''} : empty);
  const [busy, setBusy] = React.useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const togglePerm = p => set('permissions', form.permissions.includes(p) ? form.permissions.filter(x=>x!==p) : [...form.permissions,p]);
  const applyPreset = role => set('permissions', PRESETS[role]||[]);

  const save = async () => {
    if (!form.displayName || !form.email) { showToast('請填姓名與 Email','err'); return; }
    if (!item && !form.password) { showToast('請設定密碼','err'); return; }
    setBusy(true);
    try {
      if (item) {
        await FBAuth.updateUser(item._id, { displayName:form.displayName, permissions:form.permissions, active:form.active });
        showToast('已更新 ✓');
      } else {
        await FBAuth.createUser(form.email, form.password, { displayName:form.displayName, email:form.email, permissions:form.permissions, active:form.active });
        showToast('已新增 ✓');
      }
      onSaved && onSaved();
      onClose();
    } catch(e) {
      console.error('[UserModal save] 失敗:', e);
      const msg = e.code === 'permission-denied'
        ? '權限不足：請確認你的帳號是 admin，且 firestore.rules 已部署最新版'
        : (e.message || '儲存失敗');
      showToast(msg, 'err');
    }
    finally { setBusy(false); }
  };

  return (
    <div className="m-overlay">
      <div className="m-box" style={{width:560}}>
        <div className="m-hd"><h3>{item?'✏️ 編輯使用者':'➕ 新增使用者'}</h3><button className="m-close" onClick={onClose}>×</button></div>
        <div className="m-body">
          <div className="m-row">
            <div className="m-field"><label style={LBL}>顯示名稱 *</label><input style={INP} value={form.displayName} onChange={e=>set('displayName',e.target.value)}/></div>
            <div className="m-field"><label style={LBL}>電子郵件 *</label><input style={INP} type="email" value={form.email} onChange={e=>set('email',e.target.value)} disabled={!!item}/></div>
          </div>
          {!item && <div className="m-field"><label style={LBL}>初始密碼 *</label><input style={INP} type="password" value={form.password} onChange={e=>set('password',e.target.value)}/></div>}
          <div className="m-field">
            <label style={LBL}>啟用狀態</label>
            <div className="seg" style={{marginTop:4}}>
              {[true,false].map(v=><button key={String(v)} className={`seg-btn${form.active===v?' active':''}`} onClick={()=>set('active',v)}>{v?'✅ 啟用':'⛔ 停用'}</button>)}
            </div>
          </div>
          <div className="m-field">
            <label style={LBL}>角色快速套用</label>
            <div className="preset-row">
              {[['admin','p-admin','管理員'],['manager','p-mgr','主管'],['operator','p-eng','工程師'],['viewer','p-view','查閱']].map(([r,cls,l])=>(
                <button key={r} className={`preset-chip ${cls}`} onClick={()=>applyPreset(r)}>{l}</button>
              ))}
            </div>
          </div>
          <div className="m-field">
            <label style={LBL}>個別權限</label>
            <div className="perm-grid">
              {Object.entries(PERMS).map(([p,label])=>(
                <label key={p} className={`perm-chip${form.permissions.includes(p)?' on':''}`}>
                  <input type="checkbox" checked={form.permissions.includes(p)} onChange={()=>togglePerm(p)}/>{label}
                </label>
              ))}
            </div>
          </div>
        </div>
        <div className="m-foot">
          <button className="btn-cancel" onClick={onClose}>取消</button>
          <button className="btn-save" onClick={save} disabled={busy}>{busy?'儲存中...':'💾 儲存'}</button>
        </div>
      </div>
    </div>
  );
}

/* 管理員後台 */
function AdminPanel({ user }) {
  const K = window.K;
  const {useState: useSt, useEffect: useEff} = React;
  const [sub, setSub]           = useSt('users');
  const [settingTab, setSettingTab] = useSt('workboard'); // workboard | issues | samples
  const [users, setUsers]       = useSt([]);
  const [loading, setLoading]   = useSt(true);
  const [userModal, setUserModal] = useSt(false);
  const [editUser, setEditUser] = useSt(null);
  const [saving, setSaving]     = useSt(false);
  const [sortKey, setSortKey]   = useSt('name');   // name | email | role
  const [sortDir, setSortDir]   = useSt('asc');    // asc | desc

  // 工作看板設定
  const [wbEng,  setWbEng]  = useSt([]);
  const [wbMach, setWbMach] = useSt([]);
  // 異常與資源設定
  const [isEng,  setIsEng]  = useSt([]);
  const [isMach, setIsMach] = useSt([]);
  // 是否同步工作看板設定
  const [sync, setSync] = useSt(true);
  // 3D列印機預約設定
  const [bkSync,  setBkSync]  = useSt(true);
  const [bkEng,   setBkEng]   = useSt([]);
  const [bkMach,  setBkMach]  = useSt([]);
  const [bkSales, setBkSales] = useSt([]);
  // 樣品借用人清單
  const [borrowers, setBorrowers] = useSt([]);

  const INP = {width:'100%',padding:'8px 11px',border:'1.5px solid #e6e8ec',borderRadius:6,fontSize:13,fontFamily:'inherit',outline:'none'};
  const DEF_ENG  = K.ENG_ORDER.map(k=>({key:k,label:K.ENG_LABEL[k]||k}));
  const DEF_MACH = K.MACHINES.map(m=>({name:m}));
  const DEF_BORR = [{key:'Wang',label:'王小明'},{key:'Lee',label:'李美華'},{key:'Chang',label:'張大偉'},{key:'Chen',label:'陳怡君'},{key:'Lin',label:'林志豪'}];
  const DEF_SALES = [{key:'Amber',label:'安柏'},{key:'Charlie',label:'查理'}];

  // 使用者排序：依姓名/Email 字母（localeCompare）、依權限等級（管理員>工程師>查閱）
  const roleRank = u => u.permissions?.includes('admin') ? 0 : u.permissions?.includes('edit_board') ? 1 : 2;
  const toggleSort = k => { if(sortKey===k) setSortDir(d=>d==='asc'?'desc':'asc'); else { setSortKey(k); setSortDir('asc'); } };
  const sortedUsers = [...users].sort((a,b)=>{
    let r = 0;
    if(sortKey==='name')       r = (a.displayName||'').localeCompare(b.displayName||'', 'zh-Hant');
    else if(sortKey==='email') r = (a.email||'').localeCompare(b.email||'');
    else if(sortKey==='role')  r = roleRank(a) - roleRank(b);
    return sortDir==='asc' ? r : -r;
  });

  useEff(()=>{
    // 使用者清單改為即時訂閱（儲存後自動更新，免 F5）
    const unsubUsers = FBAuth.onUsersSnapshot(us => { setUsers(us); });
    (async()=>{
      const st = await FBSettings.get();
      if(st){
        setWbEng(st.engineers   || DEF_ENG);
        setWbMach(st.machines   || DEF_MACH);
        setIsEng(st.is_engineers || st.engineers || DEF_ENG);
        setIsMach(st.is_machines  || st.machines  || DEF_MACH);
        setSync(st.sync_issues !== false);
        const rawB = st.borrowers || DEF_BORR;
        setBorrowers(rawB.map(b => typeof b === 'string' ? {key:b, label:b} : b));
        // 3D列印機預約設定
        const bkS = st.bk_sync !== false;
        setBkSync(bkS);
        setBkEng(st.bk_engineers  || (bkS ? (st.engineers||DEF_ENG)  : DEF_ENG));
        setBkMach(st.bk_machines  || (bkS ? (st.machines||DEF_MACH)  : DEF_MACH));
        setBkSales(st.bk_sales || DEF_SALES);
      } else {
        setWbEng(DEF_ENG); setWbMach(DEF_MACH);
        setIsEng(DEF_ENG); setIsMach(DEF_MACH);
        setBorrowers(DEF_BORR);
        setBkEng(DEF_ENG); setBkMach(DEF_MACH); setBkSales(DEF_SALES);
      }
      setLoading(false);
    })();
    return () => { if (unsubUsers) unsubUsers(); };
  },[]);

  // 保留 refreshUsers 介面（現在訂閱會自動更新，這裡僅作相容用）
  const refreshUsers = async()=>{ /* onSnapshot 自動更新，無需手動重讀 */ };

  // 同步開關：打開時把 issues 設定複製成 workboard 的值
  const toggleSync = (val) => {
    setSync(val);
    if(val){ setIsEng([...wbEng]); setIsMach([...wbMach]); }
  };
  // workboard 變動時如果 sync=true，同步更新 issues 和 booking（如果 bkSync）
  const setWbEngSync  = v => { setWbEng(v);  if(sync) setIsEng(v);   if(bkSync) setBkEng(v);  };
  const setWbMachSync = v => { setWbMach(v); if(sync) setIsMach(v);  if(bkSync) setBkMach(v); };

  const toggleBkSync = (val) => {
    setBkSync(val);
    if(val){ setBkEng([...wbEng]); setBkMach([...wbMach]); }
  };

  const saveSettings = async()=>{
    setSaving(true);
    const s = {
      engineers:    wbEng,
      machines:     wbMach,
      is_engineers: sync ? wbEng  : isEng,
      is_machines:  sync ? wbMach : isMach,
      sync_issues:  sync,
      borrowers,
      bk_sync:      bkSync,
      bk_engineers: bkSync ? wbEng  : bkEng,
      bk_machines:  bkSync ? wbMach : bkMach,
      bk_sales:     bkSales,
    };
    await FBSettings.save(s);
    window.applySettings(s);
    // 通知樣品模組更新借用人清單
    try {
      if(window.smSetBorrowers)
        window.smSetBorrowers(borrowers.map(b=>typeof b==='string'?b:(b.label||b.key||b)));
    } catch(e){}
    setSaving(false);
    showToast('設定已儲存 ✓');
  };

  const ListEditor = ({label, list, setList, keyField=false}) => (
    <div style={{marginBottom:24}}>
      <div style={{fontSize:13,fontWeight:700,color:'#0a0e14',marginBottom:10}}>{label}</div>
      {list.map((item,i)=>(
        <div key={i} style={{display:'flex',gap:8,marginBottom:7,alignItems:'center'}}>
          {keyField && <input style={{...INP,width:110}} placeholder="Key (英文)" value={item.key||''} onChange={ev=>{const l=[...list];l[i]={...l[i],key:ev.target.value};setList(l);}}/>}
          <input style={{...INP,flex:1}} placeholder={keyField?'顯示名稱':'名稱'} value={keyField?item.label||'':item.name||item} onChange={ev=>{const l=[...list];l[i]=keyField?{...l[i],label:ev.target.value}:{name:ev.target.value};setList(l);}}/>
          <button className="kt-actbtn danger" title="刪除" onClick={()=>setList(list.filter((_,j)=>j!==i))}>✕</button>
        </div>
      ))}
      <button className="btn-cancel" style={{marginTop:2,fontSize:12}} onClick={()=>setList([...list, keyField?{key:'',label:''}:{name:''}])}>＋ 新增</button>
    </div>
  );

  const SalesEditor = () => (
    <div style={{marginBottom:24}}>
      <div style={{fontSize:13,fontWeight:700,color:'#0a0e14',marginBottom:10}}>業務清單<span style={{fontWeight:400,color:'#8a93a3',fontSize:11,marginLeft:6}}>(獨立設定，不與工作看板同步)</span></div>
      <div style={{display:'grid',gridTemplateColumns:'110px 1fr 28px',gap:'0 8px',marginBottom:4}}>
        <div style={{fontSize:11,fontWeight:600,color:'#8a93a3',padding:'0 2px'}}>英文 / Key</div>

/* Shell (主框架) */
function ChangePasswordModal({ onClose }) {
  const [cur, setCur] = React.useState('');
  const [nw, setNw] = React.useState('');
  const [cf, setCf] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const submit = async () => {
    if (!cur || !nw) { window.showToast('請填寫目前密碼與新密碼','err'); return; }
    if (nw.length < 6) { window.showToast('新密碼至少 6 碼','err'); return; }
    if (nw !== cf) { window.showToast('兩次新密碼不一致','err'); return; }
    setBusy(true);
    try {
      await window.FBAuth.changePassword(cur, nw);
      window.showToast('密碼已更新','ok');
      onClose();
    } catch(e) {
      const map = {
        'auth/wrong-password':'目前密碼錯誤',
        'auth/weak-password':'新密碼太弱（至少 6 碼）',
        'auth/requires-recent-login':'請重新登入後再變更密碼',
        'auth/too-many-requests':'嘗試次數過多，請稍後再試',
      };
      window.showToast(map[e.code] || e.message || '變更失敗','err');
    } finally { setBusy(false); }
  };
  const S_INP = {width:'100%',padding:'8px 10px',border:'1px solid var(--line)',borderRadius:6,fontSize:13,fontFamily:'inherit',marginTop:4,boxSizing:'border-box'};
  const LBL = {fontSize:12,color:'var(--ink-3)',fontWeight:600};
  return (
    <div className="m-overlay">
      <div className="m-box" style={{maxWidth:400}}>
        <div className="m-hd"><h3>🔑 變更密碼</h3><button className="m-close" onClick={onClose}>×</button></div>
        <div className="m-body">
          <div className="m-field"><label style={LBL}>目前密碼</label><input style={S_INP} type="password" value={cur} onChange={e=>setCur(e.target.value)}/></div>
          <div className="m-field"><label style={LBL}>新密碼（至少 6 碼）</label><input style={S_INP} type="password" value={nw} onChange={e=>setNw(e.target.value)}/></div>
          <div className="m-field"><label style={LBL}>確認新密碼</label><input style={S_INP} type="password" value={cf} onChange={e=>setCf(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
        </div>
        <div className="m-foot">
          <button className="btn-cancel" onClick={onClose}>取消</button>
          <button className="btn-save" onClick={submit} disabled={busy}>{busy?'更新中…':'更新密碼'}</button>
        </div>
      </div>
    </div>
  );
}

/* Root App */
function App() {
  const [user, setUser] = useStateApp(null);
  const [checking, setChecking] = useStateApp(true);

  useEffectApp(() => {
    // 監聽設定
    const unsubSettings = FBSettings.onSnapshot(s => {
      if (s) window.applySettings(s);
    });
    let unsubUserDoc = null;
    // 監聽登入狀態
    const unsubAuth = FBAuth.onStateChanged(async fbUser => {
      if (unsubUserDoc) { unsubUserDoc(); unsubUserDoc = null; }
      if (fbUser) {
        const u = await FBAuth.getUser(fbUser.uid);
        if (u && u.active) {
          setUser(u);
          // 即時訂閱自己的使用者文件：權限被改時左下角會即時更新，停用時自動登出
          unsubUserDoc = FBAuth.onUserSnapshot(fbUser.uid, async (fresh) => {
            if (!fresh || !fresh.active) {
              await FBAuth.signOut();
              setUser(null);
            } else {
              setUser(fresh);
            }
          });
        }
        else { await FBAuth.signOut(); setUser(null); }
      } else { setUser(null); }
      setChecking(false);
    });
    return () => { unsubAuth(); unsubSettings(); if (unsubUserDoc) unsubUserDoc(); };
  }, []);

  if (checking) return (
    <div style={{position:'fixed',inset:0,background:'linear-gradient(135deg,#0a0e14,#131c2e)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontFamily:'JetBrains Mono,monospace'}}>
      載入中...
    </div>
  );

  if (!user) return <LoginPage onLogin={setUser}/>;
  return <Shell user={user} onLogout={async()=>{ await FBAuth.signOut(); setUser(null); }}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
